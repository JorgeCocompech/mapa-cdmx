<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artes Vivas CDMX | Dashboard Inteligente</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #ff4757; --panel: #ffffff; --dark: #1e272e; }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #f0f0f0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Dashboard */
        #dashboard {
            width: 380px; height: 100%; z-index: 1000;
            background: var(--panel); box-shadow: 10px 0 30px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; padding: 20px;
            overflow-y: auto; flex-shrink: 0; border-right: 1px solid #eee;
        }

        #map { flex-grow: 1; height: 100%; position: relative; background: #dcdde1; }

        /* Buscador Estilo CARTO */
        .search-box {
            margin-bottom: 15px; padding: 10px; width: 100%;
            border: 2px solid #f1f2f6; border-radius: 8px;
            font-family: inherit; font-size: 0.9rem; outline: none;
            transition: border-color 0.3s;
        }
        .search-box:focus { border-color: var(--accent); }

        .counter-section { 
            text-align: center; background: var(--dark); color: white;
            padding: 20px; border-radius: 16px; margin-bottom: 20px;
        }
        .total-counter { font-size: 3.5rem; font-weight: 900; color: #00d2ff; line-height: 1; }
        .registered-label { font-size: 0.8rem; color: #a4b0be; margin-top: 5px; }

        /* Widgets Acordeón */
        .widget { margin-top: 10px; border: 1px solid #f1f2f6; border-radius: 10px; overflow: hidden; }
        .widget-header { padding: 12px 15px; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; background: #fafafa; }
        .widget-content { display: none; padding: 10px; }
        .widget.open .widget-content { display: block; }

        .stat-row { margin-bottom: 8px; cursor: pointer; padding: 4px; border-radius: 4px; transition: 0.2s; }
        .stat-row:hover { background: #f1f2f6; }
        .stat-row.active { color: var(--accent); font-weight: 800; }
        .stat-bar-bg { background: #eee; height: 4px; border-radius: 10px; margin-top: 4px; }
        .stat-bar-fill { height: 100%; transition: width 0.5s ease; }

        /* Tooltips y Popups */
        .leaflet-tooltip { background: var(--dark); color: white; border: none; font-size: 11px; font-weight: bold; border-radius: 4px; }
        .popup-container { max-height: 200px; overflow-y: auto; font-size: 11px; min-width: 180px; }

        #clear-btn { display: none; margin-top: 10px; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 6px; width: 100%; cursor: pointer; font-weight: 800; font-size: 10px; }
    </style>
</head>
<body>

    <div id="dashboard">
        <h1>ARTES VIVAS CDMX</h1>
        <input type="text" class="search-box" id="search-input" placeholder="🔍 Buscar espacio por nombre..." oninput="updateSearch()">
        
        <div class="counter-section">
            <div id="total-count" class="total-counter">0</div>
            <div class="registered-label">de 293 espacios registrados</div>
            <div id="pct-count" style="color:#ff9ff3; font-weight:800;">0%</div>
            <button id="clear-btn" onclick="clearAllFilters()">✕ Limpiar Selección</button>
        </div>
        
        <div id="stats-container"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        // --- CONFIGURACIÓN ---
        let allData = [];
        let activeFilters = {}; 
        let searchQuery = "";
        let curC = 0, curP = 0;
        let boroughLayers = {}; // Para tooltips dinámicos

        const discColors = {
            'Teatro': '#D72638', 'Danza': '#3F88C5', 'Música': '#F49D37', 
            'Performance': '#623CEA', 'Interdisciplina': '#05B2DC', 'Otros': '#515052'
        };

        const alcPalette = {
            "Azcapotzalco": "#00CED1", "Coyoacán": "#FF1493", "Cuajimalpa de Morelos": "#7FFF00",
            "Gustavo A. Madero": "#00FA9A", "Iztacalco": "#FF00FF", "Iztapalapa": "#00BFFF",
            "La Magdalena Contreras": "#D2691E", "Milpa Alta": "#BDB76B", "Álvaro Obregón": "#20B2AA",
            "Tláhuac": "#EE82EE", "Tlalpan": "#CD853F", "Xochimilco": "#40E0D0",
            "Benito Juárez": "#BA55D3", "Cuauhtémoc": "#F08080", "Miguel Hidalgo": "#7B68EE",
            "Venustiano Carranza": "#FF69B4"
        };

        const map = L.map('map', { center: [19.38, -99.13], zoom: 11, zoomControl: false });
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© CARTO' }).addTo(map);

        map.createPane('alcPane').style.zIndex = 200;
        map.createPane('markerPane').style.zIndex = 650;

        // Grupo de Clustering
        const clusterGroup = L.markerClusterGroup({
            clusterPane: 'markerPane',
            showCoverageOnHover: false,
            spiderfyOnMaxZoom: true
        }).addTo(map);

        // --- 1. CARGA DE ALCALDÍAS ---
        fetch('https://raw.githubusercontent.com/JorgeCocompech/mapa-cdmx/refs/heads/main/cdmx-alcaldias.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    pane: 'alcPane',
                    style: (f) => {
                        const color = alcPalette[f.properties.NOMGEO] || "#ccc";
                        return { fillColor: color, weight: 1.5, color: "white", fillOpacity: 0.15, opacity: 0.5 };
                    },
                    onEachFeature: (f, l) => {
                        boroughLayers[f.properties.NOMGEO] = l;
                        l.bindTooltip(f.properties.NOMGEO, { sticky: true });
                    }
                }).addTo(map);
            });

        // --- 2. CARGA DE PUNTOS ---
        Papa.parse('https://raw.githubusercontent.com/observatoriopoliticas/cartografias-artesvivas/refs/heads/main/cdmx_artesvivas.csv', {
            download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
            complete: r => { 
                allData = r.data || []; 
                updateView();
            }
        });

        function updateView() {
            // Lógica de Filtrado (Categorías + Buscador)
            const filtered = allData.filter(d => {
                const matchesFilters = Object.entries(activeFilters).every(([c, v]) => d[c] === v);
                const matchesSearch = d.nombre.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesFilters && matchesSearch;
            });

            animateCounters(filtered.length, allData.length);
            updateBoroughTooltips(filtered);

            clusterGroup.clearLayers();
            filtered.forEach(p => {
                const lat = parseFloat(p.latitud), lng = parseFloat(p.longitud);
                if (!isNaN(lat) && !isNaN(lng)) {
                    const marker = L.circleMarker([lat, lng], {
                        radius: 8, 
                        fillColor: discColors[p.disciplina] || discColors['Otros'],
                        color: "#fff", weight: 2, fillOpacity: 0.9,
                        className: `m-type-${(p.disciplina || 'Otros').replace(/\s/g, '')}` // Para highlight
                    });
                    
                    marker.bindPopup(createPopup(p));
                    clusterGroup.addLayer(marker);
                }
            });

            document.getElementById('clear-btn').style.display = Object.keys(activeFilters).length > 0 ? 'block' : 'none';
            renderWidgets(filtered);
        }

        // --- HIGHLIGHT CRUZADO ---
        function highlightInMap(type, state) {
            const className = `.m-type-${type.replace(/\s/g, '')}`;
            document.querySelectorAll(className).forEach(el => {
                el.style.strokeWidth = state ? "6px" : "2px";
                el.style.stroke = state ? "yellow" : "white";
                if(state) el.setAttribute('r', '12'); else el.setAttribute('r', '8');
            });
        }

        // --- BUSCADOR ---
        function updateSearch() {
            searchQuery = document.getElementById('search-input').value;
            updateView();
        }

        // --- TOOLTIPS ENRIQUECIDOS ---
        function updateBoroughTooltips(data) {
            const counts = {};
            data.forEach(d => { counts[d.alcaldia] = (counts[d.alcaldia] || 0) + 1; });
            
            Object.keys(boroughLayers).forEach(name => {
                const total = counts[name] || 0;
                boroughLayers[name].setTooltipContent(`<b>${name}</b><br>${total} espacios filtrados`);
            });
        }

        function createPopup(p) {
            let html = `<div class="popup-container"><span class="p-title">${p.nombre}</span>`;
            Object.keys(p).forEach(k => {
                if(!['latitud','longitud','carto_id'].includes(k.toLowerCase()) && p[k]) {
                    html += `<div class="p-row"><span class="p-label">${k.replace(/_/g,' ')}</span>${p[k]}</div>`;
                }
            });
            return html + `</div>`;
        }

        function animateCounters(targetC, universeTotal) {
            const cEl = document.getElementById('total-count'), pEl = document.getElementById('pct-count');
            const targetP = universeTotal > 0 ? (targetC / universeTotal * 100) : 0;
            const sC = curC, sP = curP, dur = 400;
            let startT = null;
            function step(t) {
                if (!startT) startT = t;
                const prog = Math.min((t - startT) / dur, 1);
                curC = prog * (targetC - startC) + startC;
                curP = prog * (targetP - startP) + startP;
                cEl.textContent = Math.floor(curC);
                pEl.textContent = curP.toFixed(1) + "%";
                if (prog < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        function renderWidgets(data) {
            const container = document.getElementById('stats-container');
            const cols = ['disciplina', 'alcaldia', 'sostenimiento', 'estatus'];
            const openWidgets = Array.from(document.querySelectorAll('.widget.open')).map(w => w.dataset.col);
            container.innerHTML = '';

            cols.forEach(col => {
                const counts = {};
                data.forEach(d => { let v = d[col] || "N/A"; counts[v] = (counts[v] || 0) + 1; });
                const widget = document.createElement('div');
                widget.className = `widget ${openWidgets.includes(col) || (Object.keys(activeFilters).length === 0 && col === 'disciplina') ? 'open' : ''}`;
                widget.dataset.col = col;

                let html = `<div class="widget-header" onclick="this.parentElement.classList.toggle('open')"><span>${col}</span> ▾</div><div class="widget-content">`;
                Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([val, count]) => {
                    const barP = data.length > 0 ? (count / data.length * 100) : 0;
                    const isActive = activeFilters[col] === val;
                    const barC = col === 'disciplina' ? discColors[val] || discColors['Otros'] : '#ff4757';
                    
                    html += `<div class="stat-row ${isActive ? 'active' : ''}" 
                                  onclick="toggleFilter('${col}', '${val}')"
                                  onmouseover="if('${col}'==='disciplina') highlightInMap('${val}', true)"
                                  onmouseout="if('${col}'==='disciplina') highlightInMap('${val}', false)">
                        <div style="display:flex;justify-content:space-between;font-size:12px"><span>${val}</span><strong>${count}</strong></div>
                        <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${barP}%; background:${barC}"></div></div>
                    </div>`;
                });
                widget.innerHTML = html + `</div>`;
                container.appendChild(widget);
            });
        }

        function toggleFilter(c, v) {
            if (activeFilters[c] === v) delete activeFilters[c];
            else activeFilters[c] = v;
            updateView();
        }
        function clearAllFilters() { activeFilters = {}; document.getElementById('search-input').value = ""; searchQuery = ""; updateView(); }
    </script>
</body>
</html>
