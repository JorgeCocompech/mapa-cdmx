<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artes Vivas CDMX | Observatorio</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #ff4757;
            --panel: rgba(24, 28, 31, 0.98);
            --text: #ffffff;
            --highlight: #00d2ff;
            --header-bg: #2d3436;
        }

        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #111; display: flex; height: 100vh; overflow: hidden; color: var(--text); }
        
        #dashboard {
            width: 380px; height: 100%; z-index: 2000;
            background: var(--panel); backdrop-filter: blur(20px);
            display: flex; flex-direction: column; padding: 25px;
            overflow-y: auto; flex-shrink: 0; border-right: 1px solid #333;
        }

        #map { flex-grow: 1; height: 100%; position: relative; }

        /* Timeline CARTO Pro */
        #timeline-container {
            position: absolute; bottom: 30px; left: 410px; right: 30px;
            background: rgba(15, 15, 15, 0.95); padding: 20px 30px; border-radius: 50px;
            z-index: 1500; border: 1px solid #444; display: flex; align-items: center; gap: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .play-btn {
            background: var(--highlight); border: none; color: #000;
            width: 50px; height: 50px; border-radius: 50%; cursor: pointer;
            font-size: 1.4rem; display: flex; align-items: center; justify-content: center;
        }

        #year-display { font-family: 'JetBrains Mono', monospace; font-size: 2.2rem; color: var(--highlight); min-width: 110px; }
        input[type=range] { flex-grow: 1; accent-color: var(--highlight); cursor: pointer; }

        /* Dashboard UI */
        h1 { font-size: 1.1rem; margin: 0 0 15px 0; font-weight: 900; border-bottom: 4px solid var(--accent); display: inline-block; }
        .search-box { margin-bottom: 15px; padding: 12px; width: 100%; border: 1px solid #444; border-radius: 10px; background: rgba(255,255,255,0.05); color: white; outline: none; }
        
        .counter-section { text-align: center; background: #000; padding: 20px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #333; }
        .total-counter { font-size: 4rem; font-weight: 900; color: var(--highlight); line-height: 1; }
        .pct-label { color: #ff9ff3; font-weight: 800; font-size: 1.1rem; margin-top: 5px; }

        /* Widgets */
        .widget { margin-top: 10px; border: 1px solid #333; border-radius: 12px; background: rgba(255,255,255,0.03); overflow: hidden; }
        .widget-header { padding: 14px 18px; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: #aaa; }
        .widget-content { display: none; padding: 10px; }
        .widget.open .widget-content { display: block; }

        .stat-row { margin-bottom: 8px; cursor: pointer; padding: 8px; border-radius: 8px; transition: 0.2s; border: 1px solid transparent; }
        .stat-row.active { background: rgba(0,210,255,0.15); border-color: var(--highlight); color: var(--highlight); font-weight: 700; }
        .stat-info { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
        .stat-bar-bg { background: rgba(255,255,255,0.1); height: 5px; border-radius: 10px; overflow: hidden; }

        /* Popups */
        .popup-container { font-size: 11px; color: #333; width: 240px; }
        .p-title { color: var(--accent); font-weight: 900; font-size: 15px; display: block; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        .p-row { border-bottom: 1px solid #f5f5f5; padding: 4px 0; display: flex; flex-direction: column; }
        .p-label { font-weight: 800; color: #999; text-transform: uppercase; font-size: 9px; }

        #clear-btn { display: none; background: var(--accent); border: none; color: white; padding: 10px; border-radius: 8px; margin-top: 10px; width: 100%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="dashboard">
        <h1>ARTES VIVAS CDMX</h1>
        <input type="text" class="search-box" id="search-input" placeholder="🔍 Buscar espacio..." oninput="updateSearch()">
        
        <div class="counter-section">
            <div id="total-count" class="total-counter">0</div>
            <div style="font-size: 0.8rem; color: #888;">espacios registrados en <span id="current-year-label" style="color:var(--highlight)">-</span></div>
            <div id="pct-count" class="pct-label">0%</div>
            <button id="clear-btn" onclick="clearAllFilters()">✕ REINICIAR TODO</button>
        </div>
        
        <div id="stats-container"></div>
    </div>

    <div id="map">
        <div id="timeline-container">
            <button class="play-btn" id="play-pause-btn" onclick="togglePlay()">▶</button>
            <div id="year-display">----</div>
            <input type="range" id="year-slider" oninput="manualYearChange(this.value)">
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        // --- CONFIG ---
        const labelMap = {
            'disciplina': 'Disciplina', 'alcaldia': 'Alcaldía', 'condicion_mobiliaria': 'Condición mobiliaria',
            'circuito': 'Circuito', 'aforo': 'Aforo', 'ano_ap': 'Año Apertura',
            'ano_cl': 'Año Clausura', 'sostenimiento': 'Sostenimiento', 'estatus': 'Estatus', 'contacto': 'Contacto'
        };

        const discColors = {
            'Música': '#E67E22', 'Teatro': '#D72638', 'Multidisciplina': '#5B21B6',
            'Artes escénicas': '#065F46', 'Otras disciplinas': '#374151',
            'Artes vivas': '#8E24AA', 'Danza': '#1E3A8A', 'Sin información': '#9CA3AF'
        };

        const alcPalette = {
            "Azcapotzalco": "#00CED1", "Coyoacán": "#FF1493", "Cuajimalpa de Morelos": "#7FFF00",
            "Gustavo A. Madero": "#00FA9A", "Iztacalco": "#FF00FF", "Iztapalapa": "#00BFFF",
            "La Magdalena Contreras": "#D2691E", "Milpa Alta": "#BDB76B", "Álvaro Obregón": "#20B2AA",
            "Tláhuac": "#EE82EE", "Tlalpan": "#CD853F", "Xochimilco": "#40E0D0",
            "Benito Juárez": "#BA55D3", "Cuauhtémoc": "#F08080", "Miguel Hidalgo": "#7B68EE",
            "Venustiano Carranza": "#FF69B4"
        };

        let allData = [], activeFilters = { disciplina: [], alcaldia: [], condicion_mobiliaria: [], circuito: [], aforo: [], ano_ap: [], ano_cl: [], sostenimiento: [], estatus: [] };
        let searchQuery = "", currentYear = 2024, isPlaying = false, timer = null, timelineSteps = [];
        let curC = 0, curP = 0;

        const map = L.map('map', { center: [19.38, -99.13], zoom: 11, zoomControl: false, doubleClickZoom: false });
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Base/MapServer/tile/{z}/{y}/{x}').addTo(map);
        map.createPane('markerPane').style.zIndex = 650;
        const markersLayer = L.layerGroup().addTo(map);

        // 1. Alcaldías
        fetch('https://raw.githubusercontent.com/JorgeCocompech/mapa-cdmx/refs/heads/main/cdmx-alcaldias.geojson')
            .then(res => res.json()).then(data => {
                L.geoJSON(data, { style: (f) => ({ fillColor: alcPalette[f.properties.NOMGEO] || "#555", weight: 1.5, color: "white", fillOpacity: 0.12 }) }).addTo(map);
            });

        // 2. CSV - Limpieza de datos inmediata
        Papa.parse('https://raw.githubusercontent.com/observatoriopoliticas/cartografias-artesvivas/refs/heads/main/cdmx_artesvivas.csv', {
            download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
            complete: r => { 
                allData = r.data.map(d => ({
                    ...d,
                    ano_ap: parseInt(d.ano_ap) || 0,
                    ano_cl: parseInt(d.ano_cl) || 0
                }));
                setupTimeline();
                updateView();
            }
        });

        function setupTimeline() {
            const years = [...new Set(allData.flatMap(d => [d.ano_ap, d.ano_cl]))]
                          .filter(y => y > 1850).sort((a,b) => a-b);
            
            let steps = [];
            for(let y = years[0]; y <= 2026; y++) {
                if(years.includes(y) || y % 5 === 0) steps.push(y);
            }
            timelineSteps = steps;
            
            const slider = document.getElementById('year-slider');
            slider.min = 0;
            slider.max = timelineSteps.length - 1;
            slider.value = timelineSteps.length - 1;
            currentYear = timelineSteps[slider.value];
            document.getElementById('year-display').textContent = currentYear;
            document.getElementById('current-year-label').textContent = currentYear;
        }

        function updateView() {
            const filtered = allData.filter(d => {
                const matchesFilters = Object.entries(activeFilters).every(([col, sel]) => sel.length === 0 || sel.map(String).includes(String(d[col])));
                const matchesSearch = d.nombre.toLowerCase().includes(searchQuery.toLowerCase());
                
                // Lógica de Timelapse:
                // Si abrió antes del año actual Y (no ha cerrado o cerró después del año actual)
                const opened = d.ano_ap <= currentYear || d.ano_ap === 0;
                const active = !d.ano_cl || d.ano_cl === 0 || d.ano_cl > currentYear;

                return matchesFilters && matchesSearch && opened && active;
            });

            animateCounters(filtered.length, allData.length);
            markersLayer.clearLayers();
            filtered.forEach(p => {
                const marker = L.circleMarker([p.latitud, p.longitud], {
                    pane: 'markerPane', radius: 7, fillColor: discColors[p.disciplina] || '#999',
                    color: "white", weight: 1.5, fillOpacity: 1
                });
                marker.bindPopup(createPopup(p), { autoPan: false });
                marker.on('mouseover', function() { if(!this._pinned) this.openPopup(); });
                marker.on('mouseout', function() { if(!this._pinned) this.closePopup(); });
                marker.on('click', function() {
                    markersLayer.eachLayer(m => m._pinned = false);
                    this._pinned = true; this.openPopup();
                });
                marker.addTo(markersLayer);
            });
            renderAllWidgets(filtered);
            document.getElementById('clear-btn').style.display = isAnyFilterActive() ? 'block' : 'none';
        }

        function renderAllWidgets(data) {
            const container = document.getElementById('stats-container');
            const openWidgets = Array.from(document.querySelectorAll('.widget.open')).map(w => w.dataset.col);
            container.innerHTML = '';
            
            // Los widgets que queremos ver
            const cols = ['disciplina', 'alcaldia', 'condicion_mobiliaria', 'circuito', 'aforo', 'sostenimiento', 'estatus'];
            
            cols.forEach(col => {
                const counts = {};
                data.forEach(d => { 
                    let v = d[col]; 
                    if(v === 0 || v === "" || v === "0" || v === null) v = "Sin dato";
                    counts[v] = (counts[v] || 0) + 1; 
                });

                const widget = document.createElement('div');
                widget.className = `widget ${openWidgets.includes(col) || (col === 'disciplina' && !isAnyFilterActive()) ? 'open' : ''}`;
                widget.dataset.col = col;

                let h = `<div class="widget-header" onclick="this.parentElement.classList.toggle('open')"><span>${labelMap[col]}</span> ▾</div><div class="widget-content">`;
                Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([val, count]) => {
                    const isActive = activeFilters[col].includes(val);
                    const barP = (count / data.length * 100).toFixed(0);
                    const barC = col === 'disciplina' ? (discColors[val] || '#999') : '#00d2ff';

                    h += `<div class="stat-row ${isActive ? 'active' : ''}" onclick="toggleMultiFilter('${col}', '${val}')">
                            <div class="stat-info"><span>${val}</span><strong>${count}</strong></div>
                            <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${barP}%; background:${barC}"></div></div>
                        </div>`;
                });
                widget.innerHTML = h + `</div>`;
                container.appendChild(widget);
            });
        }

        function toggleMultiFilter(col, val) {
            const idx = activeFilters[col].indexOf(val);
            if(idx > -1) activeFilters[col].splice(idx, 1); else activeFilters[col].push(val);
            updateView();
        }

        function isAnyFilterActive() { return Object.values(activeFilters).some(a => a.length > 0); }

        function togglePlay() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('play-pause-btn');
            if(isPlaying) {
                btn.textContent = "⏸";
                timer = setInterval(() => {
                    const s = document.getElementById('year-slider');
                    if(parseInt(s.value) >= timelineSteps.length - 1) s.value = 0;
                    else s.value = parseInt(s.value) + 1;
                    manualYearChange(s.value);
                }, 400);
            } else { btn.textContent = "▶"; clearInterval(timer); }
        }

        function manualYearChange(idx) {
            currentYear = timelineSteps[idx];
            document.getElementById('year-display').textContent = currentYear;
            document.getElementById('current-year-label').textContent = currentYear;
            updateView();
        }

        function createPopup(p) {
            let h = `<div class="popup-container"><span class="p-title">${p.nombre}</span>`;
            Object.entries(labelMap).forEach(([k,v]) => { if(p[k] && p[k] !== 0 && p[k] !== "0") h += `<div class="p-row"><span class="p-label">${v}</span><span>${p[k]}</span></div>`; });
            return h + "</div>";
        }

        function updateSearch() { searchQuery = document.getElementById('search-input').value; updateView(); }
        
        function animateCounters(tC, univ) {
            const tP = univ > 0 ? (tC / univ * 100) : 0;
            const cEl = document.getElementById('total-count'), pEl = document.getElementById('pct-count');
            const sC = curC, sP = curP, dur = 300; let start = null;
            function step(t) {
                if(!start) start = t; const prog = Math.min((t-start)/dur, 1);
                curC = prog*(tC-sC)+sC; curP = prog*(targetP-sP)+sP;
                cEl.textContent = Math.floor(curC); pEl.textContent = curP.toFixed(1)+"%";
                if(prog < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        function clearAllFilters() { Object.keys(activeFilters).forEach(k => activeFilters[k] = []); document.getElementById('search-input').value = ""; searchQuery = ""; updateView(); }
    </script>
</body>
</html>
