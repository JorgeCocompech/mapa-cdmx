<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artes Vivas CDMX | Dashboard Observatorio</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #ff4757; --panel: #ffffff; --dark: #1e272e; }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #f0f0f0; display: flex; height: 100vh; overflow: hidden; }
        
        #dashboard {
            width: 380px; height: 100%; z-index: 1000;
            background: var(--panel); box-shadow: 10px 0 30px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; padding: 20px;
            overflow-y: auto; flex-shrink: 0; border-right: 1px solid #eee;
        }

        #map { flex-grow: 1; height: 100%; position: relative; background: #dcdde1; }

        .search-box {
            margin-bottom: 15px; padding: 12px; width: 100%;
            border: 2px solid #f1f2f6; border-radius: 8px;
            font-family: inherit; font-size: 0.9rem; outline: none;
        }

        .counter-section { 
            text-align: center; background: var(--dark); color: white;
            padding: 20px; border-radius: 16px; margin-bottom: 20px;
        }
        .total-counter { font-size: 4rem; font-weight: 900; color: #00d2ff; line-height: 1; }
        .registered-label { font-size: 0.85rem; color: #a4b0be; margin-top: 5px; font-weight: 600; }
        .percentage-badge { font-size: 1.2rem; font-weight: 800; color: #ff9ff3; margin-top: 5px; }

        .widget { margin-top: 10px; border: 1px solid #f1f2f6; border-radius: 10px; overflow: hidden; }
        .widget-header { padding: 14px 18px; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; background: #fafafa; color: #57606f; }
        .widget-content { display: none; padding: 10px; }
        .widget.open .widget-content { display: block; }

        .stat-row { margin-bottom: 8px; cursor: pointer; padding: 4px; border-radius: 4px; transition: 0.2s; }
        .stat-row.active { color: var(--accent); font-weight: 800; }
        .stat-bar-bg { background: #eee; height: 4px; border-radius: 10px; margin-top: 4px; }
        .stat-bar-fill { height: 100%; transition: width 0.7s ease; }

        /* Estilo del Popup */
        .popup-container { max-height: 280px; overflow-y: auto; font-size: 11px; color: #333; width: 240px; }
        .p-title { color: var(--accent); font-weight: 900; font-size: 15px; display: block; margin-bottom: 10px; border-bottom: 2px solid #f1f2f6; padding-bottom: 5px; }
        .p-row { border-bottom: 1px solid #f9f9f9; padding: 5px 0; display: flex; flex-direction: column; }
        .p-label { font-weight: 800; color: #888; text-transform: uppercase; font-size: 9px; }

        #clear-btn { display: none; margin-top: 10px; padding: 10px; background: #ff4757; color: white; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: 800; font-size: 10px; }
    </style>
</head>
<body>

    <div id="dashboard">
        <h1>ARTES VIVAS CDMX</h1>
        <input type="text" class="search-box" id="search-input" placeholder="🔍 Buscar por nombre..." oninput="updateSearch()">
        
        <div class="counter-section">
            <div id="total-count" class="total-counter">0</div>
            <div class="registered-label">de <span id="universe-total">293</span> espacios registrados</div>
            <div id="pct-count" class="percentage-badge">0%</div>
            <button id="clear-btn" onclick="clearAllFilters()">✕ Limpiar Selección</button>
        </div>
        
        <div id="stats-container"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        const labelMap = {
            'disciplina': 'Disciplina',
            'circuito': 'Circuito',
            'ano_ap': 'Año Apertura',
            'ano_cl': 'Año Clausura',
            'condicion_mobiliaria': 'Condición mobiliaria',
            'sostenimiento': 'Sostenimiento',
            'estatus': 'Estatus',
            'clausuras': 'Clausuras',
            'aforo': 'Aforo',
            'alcaldia': 'Alcaldía',
            'contacto': 'Contacto'
        };

        const discColors = {
            'Teatro': '#D72638', 'Danza': '#3F88C5', 'Música': '#F49D37', 
            'Performance': '#623CEA', 'Interdisciplina': '#05B2DC', 'Otros': '#515052'
        };

        const alcPalette = {
            "Azcapotzalco": "#00CED1", "Coyoacán": "#FF1493", "Cuajimalpa de Morelos": "#7FFF00",
            "Gustavo A. Madero": "#00FA9A", "Iztacalco": "#FF00FF", "Iztapalapa": "#00BFFF",
            "La Magdalena Contreras": "#D2691E", "Milpa Alta": "#BDB76B", "Álvaro Obregón": "#20B2AA",
            "Tláhuac": "#EE82EE", "Tlalpan": "#CD853F", "Xochimilco": "#40E0D0",
            "Benito Juárez": "#BA55D3", "Cuauhtémoc": "#F08080", "Miguel Hidalgo": "#7B68EE",
            "Venustiano Carranza": "#FF69B4"
        };

        let allData = [];
        let activeFilters = {}; 
        let searchQuery = "";
        let curC = 0, curP = 0;
        let boroughLayers = {};

        const map = L.map('map', { center: [19.38, -99.13], zoom: 11, zoomControl: false });
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© CARTO' }).addTo(map);

        map.createPane('alcPane').style.zIndex = 200;
        map.createPane('markerPane').style.zIndex = 650;

        const markersLayer = L.layerGroup().addTo(map);

        fetch('https://raw.githubusercontent.com/JorgeCocompech/mapa-cdmx/refs/heads/main/cdmx-alcaldias.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    pane: 'alcPane',
                    style: (f) => {
                        const name = f.properties.NOMGEO || "X";
                        const color = alcPalette[name] || "#ccc";
                        return { fillColor: color, weight: 1.5, color: "white", fillOpacity: 0.12, opacity: 0.5 };
                    },
                    onEachFeature: (f, l) => {
                        boroughLayers[f.properties.NOMGEO] = l;
                        l.bindTooltip(f.properties.NOMGEO);
                    }
                }).addTo(map);
            });

        Papa.parse('https://raw.githubusercontent.com/observatoriopoliticas/cartografias-artesvivas/refs/heads/main/cdmx_artesvivas.csv', {
            download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
            complete: r => { 
                allData = r.data || []; 
                document.getElementById('universe-total').textContent = allData.length;
                setTimeout(() => { map.invalidateSize(); updateView(); }, 300);
            }
        });

        function updateView() {
            const filtered = allData.filter(d => {
                const matchesFilters = Object.entries(activeFilters).every(([c, v]) => String(d[c]) === String(v));
                const matchesSearch = d.nombre.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesFilters && matchesSearch;
            });

            animateCounters(filtered.length, allData.length);
            updateBoroughTooltips(filtered);

            markersLayer.clearLayers();
            filtered.forEach(p => {
                const lat = parseFloat(p.latitud), lng = parseFloat(p.longitud);
                if (!isNaN(lat) && !isNaN(lng)) {
                    const marker = L.circleMarker([lat, lng], {
                        pane: 'markerPane',
                        radius: 8, 
                        fillColor: discColors[p.disciplina] || discColors['Otros'],
                        color: "#fff", weight: 2, fillOpacity: 1
                    });

                    marker.bindPopup(createFormattedPopup(p));

                    // --- ACCIÓN HOVER ---
                    marker.on('mouseover', function (e) {
                        this.openPopup();
                        this.setStyle({ weight: 4, color: '#f1c40f' }); // Feedback visual al posarse
                    });
                    marker.on('mouseout', function (e) {
                        this.closePopup();
                        this.setStyle({ weight: 2, color: '#fff' }); // Regresa al estado original
                    });

                    marker.addTo(markersLayer);
                }
            });

            document.getElementById('clear-btn').style.display = Object.keys(activeFilters).length > 0 ? 'block' : 'none';
            renderWidgets(filtered);
        }

        function createFormattedPopup(p) {
            let html = `<div class="popup-container"><span class="p-title">${p.nombre}</span>`;
            Object.keys(labelMap).forEach(key => {
                const val = p[key];
                if (val && val !== "" && val !== 0 && val !== "0") {
                    html += `<div class="p-row"><span class="p-label">${labelMap[key]}</span><span>${val}</span></div>`;
                }
            });
            return html + `</div>`;
        }

        function updateSearch() {
            searchQuery = document.getElementById('search-input').value;
            updateView();
        }

        function updateBoroughTooltips(data) {
            const counts = {};
            data.forEach(d => { counts[d.alcaldia] = (counts[d.alcaldia] || 0) + 1; });
            Object.keys(boroughLayers).forEach(name => {
                const total = counts[name] || 0;
                boroughLayers[name].setTooltipContent(`<b>${name}</b>: ${total} espacios`);
            });
        }

        function animateCounters(targetC, universeTotal) {
            const cEl = document.getElementById('total-count'), pEl = document.getElementById('pct-count');
            const targetP = universeTotal > 0 ? (targetC / universeTotal * 100) : 0;
            const startC = curC, startP = curP, dur = 400;
            let startT = null;
            function step(t) {
                if (!startT) startT = t;
                const prog = Math.min((t - startT) / dur, 1);
                curC = prog * (targetC - startC) + startC;
                curP = prog * (targetP - startP) + startP;
                cEl.textContent = Math.floor(curC);
                pEl.textContent = curP.toFixed(1) + "%";
                if (prog < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        function renderWidgets(data) {
            const container = document.getElementById('stats-container');
            const cols = ['disciplina', 'alcaldia', 'condicion_mobiliaria', 'circuito', 'ano_ap', 'ano_cl', 'sostenimiento', 'estatus'];
            const openWidgets = Array.from(document.querySelectorAll('.widget.open')).map(w => w.dataset.col);
            container.innerHTML = '';

            cols.forEach(col => {
                const counts = {};
                data.forEach(d => { 
                    let v = d[col];
                    if (v === 0 || v === "0" || v === "" || v === null) v = null;
                    if (v) counts[v] = (counts[v] || 0) + 1; 
                });

                if (Object.keys(counts).length === 0) return;

                const widget = document.createElement('div');
                widget.className = `widget ${openWidgets.includes(col) ? 'open' : ''}`;
                widget.dataset.col = col;

                const labelDisplay = labelMap[col] || col;
                let html = `<div class="widget-header" onclick="this.parentElement.classList.toggle('open')"><span>${labelDisplay}</span> ▾</div><div class="widget-content">`;
                
                Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([val, count]) => {
                    const barP = data.length > 0 ? (count / data.length * 100) : 0;
                    const isActive = String(activeFilters[col]) === String(val);
                    const barC = col === 'disciplina' ? discColors[val] || discColors['Otros'] : '#ff4757';
                    
                    html += `<div class="stat-row ${isActive ? 'active' : ''}" onclick="toggleFilter('${col}', '${val}')">
                        <div style="display:flex;justify-content:space-between;font-size:12px"><span>${val}</span><strong>${count}</strong></div>
                        <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${barP}%; background:${barC}"></div></div>
                    </div>`;
                });
                widget.innerHTML = html + `</div>`;
                container.appendChild(widget);
            });
        }

        function toggleFilter(c, v) {
            if (String(activeFilters[c]) === String(v)) delete activeFilters[c];
            else activeFilters[c] = v;
            updateView();
        }
        function clearAllFilters() { activeFilters = {}; document.getElementById('search-input').value = ""; searchQuery = ""; updateView(); }
    </script>
</body>
</html>
