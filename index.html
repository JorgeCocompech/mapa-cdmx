<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Observatorio Analítico | Artes Vivas CDMX</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* MOTOR DE TEMAS: VARIABLES CSS */
        :root { --accent: #ff4757; }

        [data-theme="dark"] {
            --bg-color: #0d0d0d;
            --panel-bg: #141414;
            --text-main: #ffffff;
            --text-muted: #8a8f93;
            --highlight: #1785FB; 
            --border-color: #262626;
            --input-bg: #1f1f1f;
            --card-bg: #1c1c1e;
            --row-hover: rgba(255,255,255,0.05);
            --row-active: rgba(23, 133, 251, 0.15);
            --bar-bg: #333333;
        }

        [data-theme="light"] {
            --bg-color: #f5f5f5;
            --panel-bg: #ffffff;
            --text-main: #2C2C2C;
            --text-muted: #747d82;
            --highlight: #1785FB;
            --border-color: #e2e6e9;
            --input-bg: #f9f9f9;
            --card-bg: #ffffff;
            --row-hover: rgba(0,0,0,0.03);
            --row-active: rgba(23, 133, 251, 0.1);
            --bar-bg: #e2e6e9;
        }
        
        * { box-sizing: border-box; }
        body { 
            margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
            background: var(--bg-color); color: var(--text-main);
            display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }

        /* Envoltorio principal (Dashboard + Mapa) */
        #main-wrapper {
            display: flex; flex-grow: 1; height: calc(100vh - 75px); width: 100%;
        }
        
        /* Panel Lateral (Dashboard) */
        #dashboard {
            width: 380px; height: 100%; z-index: 1000;
            background: var(--panel-bg);
            display: flex; flex-direction: column; 
            flex-shrink: 0; border-right: 1px solid var(--border-color);
        }

        .dashboard-header {
            padding: 24px 20px 10px 20px; flex-shrink: 0;
        }

        /* Contenedor Scrolleable con gap para Bloques Separados */
        #stats-container {
            flex-grow: 1; overflow-y: auto; padding: 0 20px 20px 20px;
            display: flex; flex-direction: column; gap: 12px;
        }
        #stats-container::-webkit-scrollbar { width: 5px; }
        #stats-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        #map { flex-grow: 1; height: 100%; position: relative; background: var(--bg-color); }

        /* Botón de Tema Flotante */
        .theme-toggle-btn {
            position: absolute; top: 20px; right: 20px; z-index: 2000;
            background: var(--panel-bg); color: var(--text-main);
            border: 1px solid var(--border-color);
            width: 40px; height: 40px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        path.leaflet-interactive:focus { outline: none !important; }

        h1 { font-size: 1.1rem; font-weight: 800; margin: 0 0 16px 0; }
        
        .search-box {
            padding: 12px 14px; width: 100%;
            border: 1px solid var(--border-color); border-radius: 8px;
            background: var(--input-bg); color: var(--text-main);
            font-family: inherit; font-size: 0.85rem; outline: none; transition: 0.2s;
        }
        .search-box:focus { border-color: var(--highlight); }

        /* WIDGETS: BLOQUES SEPARADOS (CARDS) */
        .card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 10px; display: flex; flex-direction: column;
            overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .card-header {
            font-size: 0.7rem; font-weight: 700; color: var(--text-muted); 
            text-transform: uppercase; letter-spacing: 0.5px;
            padding: 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            user-select: none; transition: color 0.2s;
        }
        .card-header:hover { color: var(--text-main); }
        
        .chevron { transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); stroke: currentColor; }
        .card.open .chevron { transform: rotate(180deg); }

        .card-content-wrapper {
            display: grid; grid-template-rows: 0fr;
            transition: grid-template-rows 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card.open .card-content-wrapper { grid-template-rows: 1fr; }
        
        .card-content { overflow: hidden; padding: 0 16px; }
        .card.open .card-content { padding-bottom: 16px; }

        .total-counter { font-size: 2.8rem; font-weight: 800; color: var(--highlight); line-height: 1; margin-top: 4px;}

        .data-alert {
            background: rgba(255, 71, 87, 0.1); border: 1px solid var(--accent);
            color: var(--accent); padding: 12px; border-radius: 8px;
            font-size: 0.75rem; line-height: 1.4; margin-top: 15px; display: none;
        }

        .stat-row { 
            margin-bottom: 8px; cursor: pointer; border-radius: 6px; 
            padding: 6px 8px; border: 1px solid transparent; transition: 0.2s;
        }
        .stat-row:last-child { margin-bottom: 0; }
        .stat-row:hover { background: var(--row-hover); }
        .stat-row.active { background: var(--row-active); border-color: transparent; }
        .stat-row.active .stat-info { color: var(--highlight); font-weight: 600; }
        
        .stat-info { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 6px; color: var(--text-main); transition: 0.2s; }
        .stat-bar-bg { background: var(--bar-bg); height: 4px; border-radius: 4px; overflow: hidden; }
        .stat-bar-fill { height: 100%; transition: width 0.4s ease; border-radius: 4px; }

        #clear-btn { 
            display: none; padding: 10px 12px; margin-top: 15px;
            background: rgba(255, 71, 87, 0.1); color: var(--accent); 
            border: 1px solid var(--accent); border-radius: 6px; 
            cursor: pointer; font-weight: 600; font-size: 0.75rem; 
            transition: 0.2s; width: 100%; text-align: center; text-transform: uppercase;
        }
        #clear-btn:hover { background: var(--accent); color: #fff; }

        /* Popups */
        .leaflet-popup-content-wrapper { background: var(--panel-bg); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .leaflet-popup-tip { background: var(--panel-bg); border-bottom: 1px solid var(--border-color); border-right: 1px solid var(--border-color); }
        .popup-container { max-height: 280px; overflow-y: auto; font-size: 11px; width: 230px; }
        .p-title { color: var(--highlight); font-weight: 700; font-size: 13px; display: block; margin-bottom: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 6px; line-height: 1.3;}
        .p-row { border-bottom: 1px solid var(--border-color); padding: 5px 0; display: flex; flex-direction: column; gap: 2px;}
        .p-row:last-child { border-bottom: none; }
        .p-label { font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: 9px; }
        .p-contact-item { font-weight: 500; margin-top: 2px; word-break: break-word; color: var(--text-main); }

        /* NUEVO: ESTILOS DEL FOOTER */
        #app-footer {
            height: 75px; width: 100%; flex-shrink: 0;
            background: var(--panel-bg); border-top: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; z-index: 2000;
        }
        .footer-logo { display: flex; align-items: center; }
        .footer-logo img { max-height: 40px; width: auto; object-fit: contain; } /* Restricción para no romper los 75px */
        
        .footer-actions { display: flex; align-items: center; gap: 12px; }
        .footer-btn {
            display: flex; align-items: center; gap: 8px;
            background: var(--input-bg); border: 1px solid var(--border-color);
            color: var(--text-main); font-family: 'Inter', sans-serif;
            font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
            height: 38px; padding: 0 16px; border-radius: 20px;
            cursor: pointer; text-decoration: none; transition: 0.2s;
        }
        .footer-btn.icon-only { width: 38px; padding: 0; justify-content: center; border-radius: 50%; }
        .footer-btn:hover { border-color: var(--highlight); color: var(--highlight); }
        .footer-btn svg { width: 16px; height: 16px; fill: currentColor; }
        .footer-btn.dl-btn svg { fill: none; stroke: currentColor; }
    </style>
</head>
<body data-theme="dark">

    <div id="main-wrapper">
        <div id="dashboard">
            <div class="dashboard-header">
                <h1>ARTES VIVAS CDMX</h1>
                <input type="text" class="search-box" id="search-input" placeholder="🔍 Buscar espacio..." oninput="updateSearch()">
            </div>
            
            <div id="stats-container">
                <div class="card open">
                    <div class="card-header" style="cursor: default;">
                        <span>Total Espacios</span>
                    </div>
                    <div class="card-content-wrapper">
                        <div class="card-content">
                            <div style="display:flex; align-items:baseline; gap: 10px;">
                                <span id="total-count" class="total-counter">0</span>
                                <span id="pct-count" style="color:var(--text-muted); font-weight:600; font-size:0.9rem;"></span>
                            </div>
                            <div id="data-alert" class="data-alert"></div>
                            <button id="clear-btn" onclick="clearAllFilters()">✕ Limpiar Selección</button>
                        </div>
                    </div>
                </div>
                <div id="dynamic-widgets" style="display: flex; flex-direction: column; gap: 12px;"></div>
            </div>
        </div>

        <div id="map">
            <button class="theme-toggle-btn" id="theme-btn" onclick="toggleTheme()" title="Cambiar Tema">🌞</button>
        </div>
    </div>

    <footer id="app-footer">
        <div class="footer-logo">
            <p align="center" style="margin: 0;">
                <img src="logo-uacm.svg" alt="Logo Observatorio UACM">
            </p>
        </div>
        <div class="footer-actions">
            <button class="footer-btn icon-only" title="Compartir en X" onclick="window.open('https://twitter.com/intent/tweet?text=Explora el Observatorio de Artes Vivas CDMX&url='+encodeURIComponent(window.location.href), '_blank')">
                <svg viewBox="0 0 24 24"><path d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932ZM17.61 20.644h2.039L6.486 3.24H4.298Z"/></svg>
            </button>
            <button class="footer-btn icon-only" title="Compartir en Facebook" onclick="window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(window.location.href), '_blank')">
                <svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>
            </button>
            <a href="https://raw.githubusercontent.com/JorgeCocompech/mapa-cdmx/refs/heads/main/data/av-data-cdmx-20230122.geojson" target="_blank" download="av-data-cdmx.geojson" class="footer-btn dl-btn">
                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Descargar GeoJSON
            </a>
        </div>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const labelMap = {
            'condicion_mobiliaria': 'Condición Mobiliaria',
            'circuito': 'Circuito',
            'estatus': 'Estatus',
            'disciplina': 'Disciplinas',
            'alcaldia': 'Alcaldía'
        };

        const discColors = {
            'Música': '#E67E22', 'Teatro': '#D72638', 'Multidisciplina': '#5B21B6',
            'Artes escénicas': '#065F46', 'Otras disciplinas': '#374151',
            'Artes vivas': '#8E24AA', 'Danza': '#1E3A8A', 'Sin información': '#9CA3AF'
        };

        const alcPalette = {
            "Azcapotzalco": "#00CED1", "Coyoacán": "#FF1493", "Cuajimalpa de Morelos": "#7FFF00",
            "Gustavo A. Madero": "#00FA9A", "Iztacalco": "#FF00FF", "Iztapalapa": "#00BFFF",
            "La Magdalena Contreras": "#D2691E", "Milpa Alta": "#BDB76B", "Álvaro Obregón": "#20B2AA",
            "Tláhuac": "#EE82EE", "Tlalpan": "#CD853F", "Xochimilco": "#40E0D0",
            "Benito Juárez": "#BA55D3", "Cuauhtémoc": "#F08080", "Miguel Hidalgo": "#7B68EE",
            "Venustiano Carranza": "#FF69B4"
        };

        const chevronIcon = `<svg class="chevron" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>`;

        let allData = [];
        let activeFilters = { condicion_mobiliaria: [], circuito: [], estatus: [], disciplina: [], alcaldia: [] }; 
        let searchQuery = "";
        let curC = 0;
        let isFirstRender = true; 

        const map = L.map('map', { center: [19.38, -99.13], zoom: 11, zoomControl: false });
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        
        const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© CARTO' });
        const lightTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© CARTO' });
        darkTiles.addTo(map);
        
        map.createPane('alcPane').style.zIndex = 200;
        map.createPane('markerPane').style.zIndex = 650;
        const markersLayer = L.layerGroup().addTo(map);

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('theme-btn');
            if (body.getAttribute('data-theme') === 'dark') {
                body.setAttribute('data-theme', 'light');
                map.removeLayer(darkTiles); lightTiles.addTo(map);
                btn.textContent = '🌙';
            } else {
                body.setAttribute('data-theme', 'dark');
                map.removeLayer(lightTiles); darkTiles.addTo(map);
                btn.textContent = '🌞';
            }
            updateView(); 
        }

        fetch('https://raw.githubusercontent.com/JorgeCocompech/mapa-cdmx/refs/heads/main/cdmx-alcaldias.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    pane: 'alcPane',
                    style: (f) => ({ fillColor: alcPalette[f.properties.NOMGEO] || "#333", weight: 1.5, color: "white", fillOpacity: 0.08, opacity: 0.4 }),
                    onEachFeature: (f, l) => l.bindTooltip(f.properties.NOMGEO)
                }).addTo(map);
            });

        fetch('https://raw.githubusercontent.com/JorgeCocompech/mapa-cdmx/refs/heads/main/data/av-data-cdmx-20230122.geojson')
            .then(res => res.json())
            .then(data => {
                let perdidosArr = [];

                allData = data.features.map(f => {
                    let lng = null, lat = null;
                    if (f.geometry && f.geometry.coordinates) {
                        lng = f.geometry.coordinates[0];
                        lat = f.geometry.coordinates[1];
                    } else if (f.properties) {
                        lng = f.properties.longitud || f.properties.lng || null;
                        lat = f.properties.latitud || f.properties.lat || null;
                    }
                    
                    if(isNaN(parseFloat(lat)) || isNaN(parseFloat(lng))) {
                        perdidosArr.push(f.properties.nombre || "Espacio sin nombre");
                    }

                    return { lat: lat, longitud: lng, ...f.properties };
                });

                if(perdidosArr.length > 0) {
                    const alertBox = document.getElementById('data-alert');
                    alertBox.style.display = 'block';
                    alertBox.innerHTML = `<strong>⚠️ ${perdidosArr.length} espacios sin coordenadas:</strong><br><ul style="margin:5px 0 0 0; padding-left:15px; text-transform:none;">` 
                        + perdidosArr.map(n => `<li>${n}</li>`).join('') + "</ul><br>Se suman en estadística pero no aparecen en el mapa.";
                }

                updateView();
            });

        function updateView() {
            const filtered = allData.filter(d => {
                const matchesFilters = Object.entries(activeFilters).every(([col, selecteds]) => {
                    if (selecteds.length === 0) return true;
                    let val = d[col];
                    if (val === undefined) return false;
                    return selecteds.includes(String(val));
                });
                const nombre = d.nombre || ""; 
                const matchesSearch = nombre.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesFilters && matchesSearch;
            });

            animateCounters(filtered.length, allData.length);
            markersLayer.clearLayers();

            const activeHex = document.body.getAttribute('data-theme') === 'dark' ? '#1785FB' : '#1785FB';
            const borderHex = document.body.getAttribute('data-theme') === 'dark' ? '#ffffff' : '#111111';

            filtered.forEach(p => {
                const lat = parseFloat(p.lat);
                const lng = parseFloat(p.longitud); 
                
                if (!isNaN(lat) && !isNaN(lng)) {
                    const marker = L.circleMarker([lat, lng], {
                        pane: 'markerPane', radius: 5.5, 
                        fillColor: discColors[p.disciplina] || '#555',
                        color: borderHex, weight: 1.5, fillOpacity: 0.95
                    });

                    marker.bindPopup(createPopup(p), { autoPan: false });

                    marker.on('mouseover', function() { 
                        if(!this._pinned) {
                            this.openPopup(); 
                            this.setStyle({color: activeHex, weight: 3, radius: 7});
                        }
                    });
                    
                    marker.on('mouseout', function() { 
                        if(!this._pinned) {
                            this.closePopup(); 
                            this.setStyle({color: borderHex, weight: 1.5, radius: 5.5});
                        }
                    });
                    
                    marker.on('click', function() {
                        markersLayer.eachLayer(m => { 
                            m._pinned = false; 
                            m.setStyle({color: borderHex, weight: 1.5, radius: 5.5}); 
                        });
                        this._pinned = true; 
                        this.setStyle({color: activeHex, weight: 4, radius: 8});
                        this.openPopup();
                    });

                    marker.addTo(markersLayer);
                }
            });

            document.getElementById('clear-btn').style.display = isAnyFilterActive() ? 'block' : 'none';
            renderAllWidgets(filtered);
        }

        map.on('click', function() {
            const borderHex = document.body.getAttribute('data-theme') === 'dark' ? '#ffffff' : '#111111';
            markersLayer.eachLayer(m => { m._pinned = false; m.setStyle({color: borderHex, weight: 1.5, radius: 5.5}); });
        });

        function isAnyFilterActive() {
            return Object.values(activeFilters).some(arr => arr.length > 0) || searchQuery !== "";
        }

        function renderAllWidgets(filteredData) {
            const container = document.getElementById('dynamic-widgets');
            const openWidgets = Array.from(document.querySelectorAll('.card.open')).map(w => w.dataset.col);
            container.innerHTML = '';

            const cols = ['condicion_mobiliaria', 'circuito', 'estatus', 'disciplina', 'alcaldia'];

            cols.forEach((col, index) => {
                const otherFilters = {...activeFilters};
                delete otherFilters[col];

                const baseForThisWidget = allData.filter(d => {
                    const matchesOther = Object.entries(otherFilters).every(([c, selecteds]) => {
                        if (selecteds.length === 0) return true;
                        let val = d[c];
                        if(val === undefined) return false;
                        return selecteds.includes(String(val));
                    });
                    const nombre = d.nombre || "";
                    return matchesOther && nombre.toLowerCase().includes(searchQuery.toLowerCase());
                });

                const counts = {};
                baseForThisWidget.forEach(d => {
                    let v = d[col];
                    if (v === 0 || v === "0" || v === "" || v === null || v === undefined) v = "N/D";
                    counts[v] = (counts[v] || 0) + 1;
                });

                if (Object.keys(counts).length === 0) return;

                let isOpen = false;
                if (isFirstRender) {
                    isOpen = (index === 0);
                } else {
                    isOpen = openWidgets.includes(col);
                }

                const widget = document.createElement('div');
                widget.className = `card ${isOpen ? 'open' : ''}`; 
                widget.dataset.col = col;

                let html = `
                    <div class="card-header" onclick="this.parentElement.classList.toggle('open')">
                        <span>Por ${labelMap[col]}</span>
                        ${chevronIcon}
                    </div>
                    <div class="card-content-wrapper">
                        <div class="card-content">
                `;
                
                Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([val, count]) => {
                    const isActive = activeFilters[col].includes(String(val));
                    const barP = (count / baseForThisWidget.length * 100).toFixed(0);
                    const barC = col === 'disciplina' ? (discColors[val] || 'var(--highlight)') : 'var(--highlight)';

                    html += `
                        <div class="stat-row ${isActive ? 'active' : ''}" onclick="toggleMultiFilter('${col}', '${val}')">
                            <div class="stat-info"><span>${val}</span><span>${count}</span></div>
                            <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${barP}%; background:${barC}"></div></div>
                        </div>`;
                });
                
                html += `</div></div>`;
                widget.innerHTML = html;
                container.appendChild(widget);
            });

            isFirstRender = false;
        }

        function toggleMultiFilter(col, val) {
            const index = activeFilters[col].indexOf(val);
            if (index > -1) activeFilters[col].splice(index, 1);
            else activeFilters[col].push(val);
            updateView();
        }

        function createPopup(p) {
            let html = `<div class="popup-container"><span class="p-title">${p.nombre || 'Sin Nombre'}</span>`;
            
            const popupMap = { 
                'disciplina': 'Disciplina', 
                'circuito': 'Circuito', 
                'condicion_mobiliaria': 'Condición Mobiliaria', 
                'sostenimiento': 'Sostenimiento', 
                'estatus': 'Estatus', 
                'clausuras': 'Clausuras', 
                'aforo': 'Aforo', 
                'alcaldia': 'Alcaldía' 
            };
            
            Object.entries(popupMap).forEach(([key, label]) => {
                if (p[key] && p[key] !== 0 && p[key] !== "0") {
                    html += `<div class="p-row"><span class="p-label">${label}</span><span style="font-weight:500">${p[key]}</span></div>`;
                }
            });

            if (p.contacto && p.contacto !== 0 && p.contacto !== "0" && p.contacto.trim() !== "") {
                html += `<div class="p-row"><span class="p-label">Contacto</span>`;
                let contactos = p.contacto.split(/[,|\n]+/).map(c => c.trim()).filter(c => c !== "");
                
                contactos.forEach(c => {
                    html += `<span class="p-contact-item">${c}</span>`;
                });
                html += `</div>`;
            }

            return html + `</div>`;
        }

        function updateSearch() { searchQuery = document.getElementById('search-input').value; updateView(); }
        
        let animFrameId = null;
        function animateCounters(targetC, universeTotal) {
            const cEl = document.getElementById('total-count'), pEl = document.getElementById('pct-count');
            const startC = curC, dur = 250;
            let startT = null;

            cEl.style.color = (targetC === universeTotal) ? 'var(--text-main)' : 'var(--highlight)';
            if(animFrameId) cancelAnimationFrame(animFrameId);

            function step(t) {
                if (!startT) startT = t;
                const prog = Math.min((t - startT) / dur, 1);
                curC = prog * (targetC - startC) + startC;
                cEl.textContent = Math.floor(curC);
                
                if(targetC === universeTotal) {
                    pEl.textContent = "";
                } else {
                    const pct = (targetC / universeTotal * 100).toFixed(1);
                    pEl.textContent = `(${pct}%)`;
                }

                if (prog < 1) {
                    animFrameId = requestAnimationFrame(step);
                } else {
                    curC = targetC;
                    cEl.textContent = targetC;
                }
            }
            animFrameId = requestAnimationFrame(step);
        }

        function clearAllFilters() { 
            Object.keys(activeFilters).forEach(k => activeFilters[k] = []);
            document.getElementById('search-input').value = ""; searchQuery = ""; 
            updateView(); 
        }
    </script>
</body>
