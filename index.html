<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Analítico | Artes Vivas CDMX</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #ff4757;
            --panel: rgba(30, 39, 46, 0.95);
            --text: #ecf0f1;
            --bg: #1e272e;
            --highlight: #f1c40f;
            --header-bg: #2f3542;
        }

        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--bg); display: flex; height: 100vh; overflow: hidden; color: var(--text); }
        
        #dashboard {
            width: 380px; height: 100%; z-index: 2000;
            background: var(--panel); backdrop-filter: blur(15px);
            box-shadow: 10px 0 30px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; padding: 25px;
            overflow-y: auto; flex-shrink: 0; border-right: 1px solid rgba(255,255,255,0.05);
        }

        #map { flex-grow: 1; height: 100%; position: relative; }

        /* Timeline Superior Estilo CARTO */
        #timeline-card {
            position: absolute; bottom: 30px; left: 410px; right: 30px;
            background: var(--panel); backdrop-filter: blur(10px);
            padding: 15px 25px; border-radius: 16px; z-index: 1500;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            display: flex; align-items: center; gap: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .play-btn {
            background: var(--accent); border: none; color: white;
            width: 45px; height: 45px; border-radius: 50%; cursor: pointer;
            font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: 0.2s;
        }
        .play-btn:hover { transform: scale(1.1); box-shadow: 0 0 15px var(--accent); }

        #year-display { font-size: 1.8rem; font-weight: 900; color: var(--highlight); min-width: 90px; text-align: center; }
        input[type=range] { flex-grow: 1; accent-color: var(--accent); cursor: pointer; }

        /* Dashboard Content */
        h1 { font-size: 1.1rem; margin: 0 0 15px 0; font-weight: 900; border-bottom: 4px solid var(--accent); display: inline-block; padding-bottom: 5px; }
        .search-box { margin-bottom: 15px; padding: 12px; width: 100%; border: none; border-radius: 10px; background: var(--header-bg); color: var(--text); outline: none; border: 1px solid rgba(255,255,255,0.1); }
        
        .counter-section { text-align: center; background: #000; padding: 20px; border-radius: 16px; margin-bottom: 15px; }
        .total-counter { font-size: 3.5rem; font-weight: 900; color: #00d2ff; line-height: 1; }
        .registered-label { font-size: 0.8rem; color: #a4b0be; margin-top: 5px; }

        /* Widgets BI */
        .widget { margin-top: 12px; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; background: var(--header-bg); }
        .widget-header { padding: 14px 18px; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }
        .widget-content { display: none; padding: 12px; }
        .widget.open .widget-content { display: block; }

        .stat-row { margin-bottom: 8px; cursor: pointer; padding: 8px; border-radius: 8px; transition: 0.2s; border: 1px solid transparent; }
        .stat-row:hover { background: rgba(255,255,255,0.05); }
        .stat-row.active { background: rgba(255, 71, 87, 0.15); border-color: var(--accent); color: var(--accent); font-weight: 700; }
        
        .stat-info { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
        .stat-bar-bg { background: rgba(255,255,255,0.1); height: 5px; border-radius: 10px; overflow: hidden; }
        .stat-bar-fill { height: 100%; transition: width 0.5s ease; }

        /* Popups */
        .popup-container { max-height: 250px; overflow-y: auto; font-size: 11px; color: #333; width: 220px; }
        .p-title { color: var(--accent); font-weight: 900; font-size: 14px; display: block; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        .p-row { border-bottom: 1px solid #f5f5f5; padding: 4px 0; display: flex; flex-direction: column; }
        .p-label { font-weight: 800; color: #999; text-transform: uppercase; font-size: 9px; }

        #clear-btn { display: none; margin-top: 10px; width: 100%; padding: 10px; border-radius: 8px; background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="dashboard">
        <h1>ARTES VIVAS CDMX</h1>
        <input type="text" class="search-box" id="search-input" placeholder="🔍 Buscar espacio..." oninput="updateSearch()">
        
        <div class="counter-section">
            <div id="total-count" class="total-counter">0</div>
            <div class="registered-label">activos en <span id="current-year-label" style="color:var(--highlight)">-</span></div>
            <div id="pct-count" style="color: #ff9ff3; font-weight: 800; margin-top: 5px;">0%</div>
            <button id="clear-btn" onclick="clearAllFilters()">✕ Limpiar Selección</button>
        </div>
        
        <div id="stats-container"></div>
    </div>

    <div id="map">
        <div id="timeline-card">
            <button class="play-btn" id="play-pause-btn" onclick="togglePlay()">▶</button>
            <div id="year-display">----</div>
            <input type="range" id="year-slider" oninput="manualYearChange(this.value)">
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        // --- DATA MAPS ---
        const labelMap = {
            'disciplina': 'Disciplina', 'alcaldia': 'Alcaldía', 'condicion_mobiliaria': 'Condición mobiliaria',
            'circuito': 'Circuito', 'aforo': 'Aforo', 'ano_ap': 'Año Apertura',
            'ano_cl': 'Año Clausura', 'sostenimiento': 'Sostenimiento', 'estatus': 'Estatus', 'contacto': 'Contacto'
        };

        const discColors = {
            'Música': '#E67E22', 'Teatro': '#D72638', 'Multidisciplina': '#5B21B6',
            'Artes escénicas': '#065F46', 'Otras disciplinas': '#374151',
            'Artes vivas': '#8E24AA', 'Danza': '#1E3A8A', 'Sin información': '#9CA3AF'
        };

        const alcPalette = {
            "Azcapotzalco": "#00CED1", "Coyoacán": "#FF1493", "Cuajimalpa de Morelos": "#7FFF00",
            "Gustavo A. Madero": "#00FA9A", "Iztacalco": "#FF00FF", "Iztapalapa": "#00BFFF",
            "La Magdalena Contreras": "#D2691E", "Milpa Alta": "#BDB76B", "Álvaro Obregón": "#20B2AA",
            "Tláhuac": "#EE82EE", "Tlalpan": "#CD853F", "Xochimilco": "#40E0D0",
            "Benito Juárez": "#BA55D3", "Cuauhtémoc": "#F08080", "Miguel Hidalgo": "#7B68EE",
            "Venustiano Carranza": "#FF69B4"
        };

        // --- STATE ---
        let allData = [], activeFilters = { disciplina: [], alcaldia: [], condicion_mobiliaria: [], circuito: [], aforo: [], ano_ap: [], ano_cl: [], sostenimiento: [], estatus: [] };
        let searchQuery = "", isPlaying = false, timer = null, currentYear = 2024;
        let curC = 0, curP = 0;

        const map = L.map('map', { center: [19.38, -99.13], zoom: 11, zoomControl: false });
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Base/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' }).addTo(map);
        map.createPane('markerPane').style.zIndex = 650;
        const markersLayer = L.layerGroup().addTo(map);

        // 1. Alcaldías
        fetch('https://raw.githubusercontent.com/JorgeCocompech/mapa-cdmx/refs/heads/main/cdmx-alcaldias.geojson')
            .then(res => res.json()).then(data => {
                L.geoJSON(data, { style: (f) => {
                    const color = alcPalette[f.properties.NOMGEO] || "#ccc";
                    return { fillColor: color, weight: 1.5, color: "white", fillOpacity: 0.12 };
                }, onEachFeature: (f, l) => l.bindTooltip(f.properties.NOMGEO) }).addTo(map);
            });

        // 2. Datos
        Papa.parse('https://raw.githubusercontent.com/observatoriopoliticas/cartografias-artesvivas/refs/heads/main/cdmx_artesvivas.csv', {
            download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
            complete: r => { 
                allData = r.data || [];
                setupTimeline();
                updateView();
            }
        });

        // --- TIMELINE INTELIGENTE ---
        function setupTimeline() {
            const years = allData.map(d => parseInt(d.ano_ap)).filter(y => y > 1800 && !isNaN(y));
            const minYear = Math.min(...years);
            const maxYear = new Date().getFullYear();
            
            const slider = document.getElementById('year-slider');
            slider.min = minYear;
            slider.max = maxYear;
            slider.value = maxYear;
            currentYear = maxYear;
            document.getElementById('year-display').textContent = currentYear;
            document.getElementById('current-year-label').textContent = currentYear;
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('play-pause-btn');
            if (isPlaying) {
                btn.textContent = "⏸";
                const slider = document.getElementById('year-slider');
                if (parseInt(slider.value) >= parseInt(slider.max)) slider.value = slider.min;
                timer = setInterval(() => {
                    slider.value = parseInt(slider.value) + 1;
                    manualYearChange(slider.value);
                    if (parseInt(slider.value) >= parseInt(slider.max)) togglePlay();
                }, 200);
            } else {
                btn.textContent = "▶";
                clearInterval(timer);
            }
        }

        function manualYearChange(val) {
            currentYear = parseInt(val);
            document.getElementById('year-display').textContent = currentYear;
            document.getElementById('current-year-label').textContent = currentYear;
            updateView();
        }

        // --- LÓGICA DE FILTRADO Y MAPA ---
        function updateView() {
            const filtered = allData.filter(d => {
                const matchesFilters = Object.entries(activeFilters).every(([col, selecteds]) => {
                    if (selecteds.length === 0) return true;
                    return selecteds.map(String).includes(String(d[col]));
                });
                const matchesSearch = d.nombre.toLowerCase().includes(searchQuery.toLowerCase());
                
                // Lógica Temporal
                const opened = d.ano_ap <= currentYear;
                const notClosed = !d.ano_cl || d.ano_cl > currentYear;

                return matchesFilters && matchesSearch && opened && notClosed;
            });

            animateCounters(filtered.length, allData.length);

            markersLayer.clearLayers();
            filtered.forEach(p => {
                const marker = L.circleMarker([p.latitud, p.longitud], {
                    pane: 'markerPane', radius: 8, 
                    fillColor: discColors[p.disciplina] || discColors['Sin información'],
                    color: "#fff", weight: 2, fillOpacity: 1
                });

                marker.bindPopup(createPopup(p));
                marker.on('mouseover', function() { if(!this._pinned) this.openPopup(); });
                marker.on('mouseout', function() { if(!this._pinned) this.closePopup(); });
                marker.on('click', function() { markersLayer.eachLayer(m => m._pinned = false); this._pinned = true; this.openPopup(); });
                marker.addTo(markersLayer);
            });

            document.getElementById('clear-btn').style.display = isAnyFilterActive() ? 'block' : 'none';
            renderAllWidgets(filtered);
        }

        function isAnyFilterActive() { return Object.values(activeFilters).some(arr => arr.length > 0) || searchQuery !== ""; }

        function renderAllWidgets(filteredData) {
            const container = document.getElementById('stats-container');
            const openWidgets = Array.from(document.querySelectorAll('.widget.open')).map(w => w.dataset.col);
            container.innerHTML = '';

            const cols = ['disciplina', 'alcaldia', 'condicion_mobiliaria', 'circuito', 'aforo', 'sostenimiento', 'estatus'];

            cols.forEach(col => {
                // Cálculo de Facetas para multiselección
                const otherFilters = {...activeFilters};
                const tempFilters = {...activeFilters};
                delete tempFilters[col];

                const baseForThisWidget = allData.filter(d => {
                    const matchesOtherFilters = Object.entries(tempFilters).every(([c, sel]) => {
                        if (sel.length === 0) return true;
                        return sel.map(String).includes(String(d[c]));
                    });
                    const opened = d.ano_ap <= currentYear;
                    const notClosed = !d.ano_cl || d.ano_cl > currentYear;
                    return matchesOtherFilters && opened && notClosed && d.nombre.toLowerCase().includes(searchQuery.toLowerCase());
                });

                const counts = {};
                baseForThisWidget.forEach(d => {
                    let v = d[col];
                    if (v === 0 || v === "0" || v === "" || v === null) v = "Sin dato";
                    counts[v] = (counts[v] || 0) + 1;
                });

                if (Object.keys(counts).length === 0) return;

                const widget = document.createElement('div');
                widget.className = `widget ${openWidgets.includes(col) || (isAnyFilterActive() === false && col === 'disciplina') ? 'open' : ''}`;
                widget.dataset.col = col;

                let h = `<div class="widget-header" onclick="this.parentElement.classList.toggle('open')"><span>${labelMap[col] || col}</span> ▾</div><div class="widget-content">`;
                
                Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([val, count]) => {
                    const isActive = activeFilters[col].includes(val);
                    const barP = (count / baseForThisWidget.length * 100).toFixed(0);
                    const barC = col === 'disciplina' ? discColors[val] : '#00d2ff';

                    h += `<div class="stat-row ${isActive ? 'active' : ''}" onclick="toggleMultiFilter('${col}', '${val}')">
                            <div class="stat-info"><span>${val}</span><strong>${count}</strong></div>
                            <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${barP}%; background:${barC}"></div></div>
                        </div>`;
                });
                widget.innerHTML = h + `</div>`;
                container.appendChild(widget);
            });
        }

        function toggleMultiFilter(col, val) {
            const idx = activeFilters[col].indexOf(val);
            if (idx > -1) activeFilters[col].splice(idx, 1);
            else activeFilters[col].push(val);
            updateView();
        }

        function createPopup(p) {
            let h = `<div class="popup-container"><span class="p-title">${p.nombre}</span>`;
            Object.entries(labelMap).forEach(([k,v]) => { if(p[k] && p[k] !== "0") h += `<div class="p-row"><span class="p-label">${v}</span>${p[k]}</div>`; });
            return h + `</div>`;
        }

        function updateSearch() { searchQuery = document.getElementById('search-input').value; updateView(); }
        function animateCounters(tC, univ) {
            const tP = univ > 0 ? (tC / univ * 100) : 0;
            const cEl = document.getElementById('total-count'), pEl = document.getElementById('pct-count');
            const sC = curC, sP = curP, dur = 300; let start = null;
            function step(t) {
                if(!start) start = t; const prog = Math.min((t-start)/dur, 1);
                curC = prog*(tC-sC)+sC; curP = prog*(tP-sP)+sP;
                cEl.textContent = Math.floor(curC); pEl.textContent = curP.toFixed(1)+"%";
                if(prog < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }
        function clearAllFilters() { Object.keys(activeFilters).forEach(k => activeFilters[k] = []); document.getElementById('search-input').value = ""; searchQuery = ""; updateView(); }
    </script>
</body>
</html>
