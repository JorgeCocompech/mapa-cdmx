<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI Dashboard | Artes Vivas CDMX</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root { --accent: #e74c3c; --bg: #f0f2f5; --panel-bg: rgba(255,255,255,0.96); }
        body { margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); display: flex; height: 100vh; }
        
        #dashboard {
            width: 360px; height: 100%; z-index: 1000;
            background: var(--panel-bg); backdrop-filter: blur(10px);
            box-shadow: 2px 0 20px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; padding: 25px;
            overflow-y: auto; box-sizing: border-box;
        }

        #map { flex-grow: 1; height: 100%; position: relative; background: #d4dadc; }

        h1 { font-size: 1.1rem; margin: 0; color: #2c3e50; font-weight: 800; border-bottom: 3px solid var(--accent); padding-bottom: 10px; }
        .counter-section { margin: 20px 0; }
        .total-counter { font-size: 3rem; font-weight: 900; color: var(--accent); line-height: 1; }
        .total-label { font-size: 0.7rem; text-transform: uppercase; color: #95a5a6; letter-spacing: 1.5px; margin-top: 5px; }

        .widget { margin-top: 25px; }
        .widget-title { font-size: 0.75rem; font-weight: 700; color: #7f8c8d; text-transform: uppercase; margin-bottom: 12px; display: block; border-left: 3px solid #ddd; padding-left: 8px; }
        
        .stat-row { margin-bottom: 10px; cursor: pointer; transition: all 0.2s; padding: 6px; border-radius: 6px; }
        .stat-row:hover { background: rgba(0,0,0,0.04); }
        .stat-row.active { background: #fff5f5; border: 1px solid #ffcfcf; }
        
        .stat-info { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 4px; color: #34495e; }
        .stat-bar-bg { background: #e9ecef; height: 5px; border-radius: 3px; overflow: hidden; }
        .stat-bar-fill { background: var(--accent); height: 100%; transition: width 0.4s ease-out; opacity: 0.6; }
        .stat-row.active .stat-bar-fill { opacity: 1; }

        #clear-btn { 
            display: none; margin-top: 12px; padding: 6px 12px; background: #34495e; 
            color: white; border: none; border-radius: 4px; font-size: 0.75rem; cursor: pointer; width: 100%;
        }
    </style>
</head>
<body>

    <div id="dashboard">
        <h1>ARTES VIVAS CDMX</h1>
        <div class="counter-section">
            <div class="total-counter" id="total-count">0</div>
            <div class="total-label">Espacios filtrados</div>
            <button id="clear-btn" onclick="clearAllFilters()">✕ Quitar todos los filtros</button>
        </div>
        
        <div id="stats-container">
            <p style="color:#bdc3c7; font-size: 13px;">Cargando cartografía...</p>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://unpkg.com/wellknown@0.5.0/wellknown.js"></script>

    <script>
        // --- CONFIGURACIÓN DE COLORES POR DISCIPLINA ---
        const disciplinaColors = {
            'Teatro': '#e74c3c',
            'Danza': '#3498db',
            'Música': '#f1c40f',
            'Performance': '#9b59b6',
            'Interdisciplina': '#2ecc71',
            'Multidisciplina': '#1abc9c',
            'Otros': '#95a5a6'
        };

        function getPointColor(disciplina) {
            return disciplinaColors[disciplina] || disciplinaColors['Otros'];
        }

        let allData = [];
        let activeFilters = {}; 
        let markersLayer = L.layerGroup();
        const columnasAAnalizar = ['disciplina', 'alcaldia', 'sostenimiento', 'estatus', 'clausuras', 'aforo'];

        const map = L.map('map', { center: [19.38, -99.13], zoom: 11, zoomControl: false });
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© CARTO'
        }).addTo(map);

        markersLayer.addTo(map);
        
        // Pane para asegurar que las alcaldías estén siempre al fondo
        map.createPane('alcaldiasPane');
        map.getPane('alcaldiasPane').style.zIndex = 200;

        // --- 1. CARGA DE ALCALDÍAS ---
        const urlAlcaldias = 'https://raw.githubusercontent.com/observatoriopoliticas/mapascdmx/main/alcaldias_cdmx.csv';
        
        fetch(urlAlcaldias)
            .then(res => res.text())
            .then(csvText => {
                Papa.parse(csvText, {
                    header: true, skipEmptyLines: true,
                    complete: (results) => {
                        results.data.forEach(row => {
                            // Detección flexible de la columna de geometría
                            const wkt = row.geometry || row.WKT || row.wkt;
                            const nombre = row.nomgeo || row.ALCALDIA || "Alcaldía";
                            
                            if (wkt) {
                                try {
                                    const geojson = wellknown.parse(wkt);
                                    L.geoJSON(geojson, {
                                        pane: 'alcaldiasPane',
                                        style: {
                                            fillColor: '#2c3e50', // Color sólido oscuro pero con transparencia
                                            weight: 1.5,
                                            color: 'white',
                                            fillOpacity: 0.15, // Transparencia para ver el mapa base
                                            opacity: 0.5
                                        }
                                    }).bindTooltip(nombre, { sticky: true }).addTo(map);
                                } catch(e) { console.error("Error al leer geometría:", e); }
                            }
                        });
                    }
                });
            });

        // --- 2. CARGA DE PUNTOS ---
        const urlPuntos = 'https://raw.githubusercontent.com/observatoriopoliticas/cartografias-artesvivas/refs/heads/main/cdmx_artesvivas.csv';
        
        Papa.parse(urlPuntos, {
            download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
            complete: (results) => {
                allData = results.data;
                updateView();
            }
        });

        function updateView() {
            const filteredData = allData.filter(item => {
                return Object.entries(activeFilters).every(([col, val]) => item[col] === val);
            });

            markersLayer.clearLayers();
            filteredData.forEach(punto => {
                const lat = punto.latitud || punto.lat;
                const lng = punto.longitud || punto.lng;
                if (lat && lng) {
                    L.circleMarker([lat, lng], {
                        radius: 7,
                        fillColor: getPointColor(punto.disciplina),
                        color: "#fff",
                        weight: 1.5,
                        fillOpacity: 0.9
                    }).bindPopup(createDynamicPopup(punto)).addTo(markersLayer);
                }
            });

            document.getElementById('total-count').innerText = filteredData.length;
            document.getElementById('clear-btn').style.display = Object.keys(activeFilters).length > 0 ? 'block' : 'none';
            renderAllWidgets(filteredData);
        }

        function createDynamicPopup(punto) {
            let html = `<div style="max-height:250px; overflow-y:auto; min-width:200px;">`;
            html += `<strong style="color:var(--accent); font-size:14px;">${punto.nombre || 'Sin nombre'}</strong><hr style="border:0; border-top:1px solid #eee; margin:8px 0;">`;
            Object.keys(punto).forEach(key => {
                const val = punto[key];
                const low = key.toLowerCase();
                if (!['lat','lng','latitud','longitud','geometry','wkt','carto_id'].includes(low) && val) {
                    html += `<div style="font-size:11px; margin-bottom:4px;"><b style="text-transform:capitalize;">${key.replace(/_/g,' ')}:</b> ${val}</div>`;
                }
            });
            html += `</div>`;
            return html;
        }

        function renderAllWidgets(data) {
            const container = document.getElementById('stats-container');
            container.innerHTML = '';

            columnasAAnalizar.forEach(col => {
                const counts = {};
                data.forEach(item => {
                    let val = item[col] || "No especificado";
                    counts[val] = (counts[val] || 0) + 1;
                });

                const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
                let widgetHtml = `<div class="widget"><span class="widget-title">${col.replace(/_/g,' ')}</span>`;
                
                sorted.forEach(([val, count]) => {
                    const pct = (count / data.length * 100).toFixed(0);
                    const isActive = activeFilters[col] === val;
                    const barColor = col === 'disciplina' ? getPointColor(val) : '#e74c3c';

                    widgetHtml += `
                        <div class="stat-row ${isActive ? 'active' : ''}" onclick="toggleFilter('${col}', '${val}')">
                            <div class="stat-info">
                                <span style="font-weight:${isActive?'bold':'normal'}">${val}</span>
                                <strong>${count}</strong>
                            </div>
                            <div class="stat-bar-bg">
                                <div class="stat-bar-fill" style="width: ${pct}%; background-color: ${barColor}"></div>
                            </div>
                        </div>`;
                });
                widgetHtml += `</div>`;
                container.innerHTML += widgetHtml;
            });
        }

        function toggleFilter(column, value) {
            if (activeFilters[column] === value) { delete activeFilters[column]; }
            else { activeFilters[column] = value; }
            updateView();
        }

        function clearAllFilters() {
            activeFilters = {};
            updateView();
        }
    </script>
</body>
</html>
