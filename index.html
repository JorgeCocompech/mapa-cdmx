<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artes Vivas CDMX | Dashboard Final</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #ff4757; --panel: #ffffff; }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #f0f0f0; display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        #dashboard {
            width: 380px; height: 100%; z-index: 1000;
            background: var(--panel); box-shadow: 10px 0 30px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; padding: 25px;
            overflow-y: auto; flex-shrink: 0; border-right: 1px solid #eee;
        }

        #map { flex-grow: 1; height: 100%; position: relative; background: #dcdde1; }

        h1 { font-size: 1.1rem; margin: 0; font-weight: 900; color: #2d3436; border-bottom: 4px solid var(--accent); display: inline-block; padding-bottom: 5px; }
        
        /* Contador Estilo Centro de Mando */
        .counter-section { 
            margin: 25px 0; text-align: center; background: #1e272e; color: white;
            padding: 25px 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .total-counter { font-size: 4rem; font-weight: 900; color: #00d2ff; line-height: 1; margin: 0; }
        .registered-label { font-size: 0.9rem; font-weight: 600; color: #a4b0be; margin-top: 5px; }
        .percentage-badge { font-size: 1.2rem; font-weight: 800; color: #ff9ff3; margin-top: 5px; display: block; }
        
        /* Widgets Acordeón */
        .widget { margin-top: 12px; border: 1px solid #f1f2f6; border-radius: 12px; background: #fff; overflow: hidden; }
        .widget-header { padding: 14px 18px; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; background: #fafafa; }
        .widget-content { display: none; padding: 10px 18px; }
        .widget.open .widget-content { display: block; }

        .stat-row { margin-bottom: 12px; cursor: pointer; }
        .stat-row.active { color: var(--accent); font-weight: 800; border-left: 3px solid var(--accent); padding-left: 8px; }
        .stat-bar-bg { background: #f1f2f6; height: 6px; border-radius: 10px; overflow: hidden; margin-top: 4px; }
        .stat-bar-fill { height: 100%; transition: width 0.7s ease; background: var(--accent); }

        /* Popups */
        .popup-container { max-height: 250px; overflow-y: auto; font-size: 11px; color: #333; }
        .p-title { color: var(--accent); font-weight: 900; font-size: 14px; display: block; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        .p-row { border-bottom: 1px solid #f9f9f9; padding: 5px 0; }
        .p-label { font-weight: bold; color: #999; text-transform: uppercase; font-size: 9px; display: block; }

        #clear-btn { display: none; margin-top: 15px; padding: 12px; background: #ff4757; color: white; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: 800; text-transform: uppercase; font-size: 10px; }
    </style>
</head>
<body>

    <div id="dashboard">
        <h1>ARTES VIVAS CDMX</h1>
        <div class="counter-section">
            <div id="total-count" class="total-counter">0</div>
            <div class="registered-label">de espacios registrados</div>
            <div id="pct-count" class="percentage-badge">0%</div>
            <button id="clear-btn" onclick="clearAllFilters()">✕ Limpiar Selección</button>
        </div>
        <div id="stats-container"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        // --- CONFIGURACIÓN ---
        let allData = [];
        let activeFilters = {}; 
        let curC = 0, curP = 0;
        
        const colors = {
            'Teatro': '#ff4757', 'Danza': '#3742fa', 'Música': '#ffa502', 
            'Performance': '#8e44ad', 'Interdisciplina': '#2ed573', 'Otros': '#747d8c'
        };

        const alcNeon = ['#00d2ff', '#ff9ff3', '#00ff88', '#fff200', '#7d5fff'];

        const map = L.map('map', { center: [19.38, -99.13], zoom: 11, zoomControl: false });
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Base/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri', maxZoom: 16
        }).addTo(map);

        const markersLayer = L.layerGroup().addTo(map);
        map.createPane('alcPane').style.zIndex = 200;

        // --- 1. CARGA DE ALCALDÍAS ---
        fetch('https://raw.githubusercontent.com/JorgeCocompech/mapa-cdmx/refs/heads/main/cdmx-alcaldias.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    pane: 'alcPane',
                    style: (f) => {
                        const name = f.properties.NOMGEO || "X";
                        let h = 0; for(let i=0; i<name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
                        const c = alcNeon[Math.abs(h) % alcNeon.length];
                        return { fillColor: c, weight: 2.5, color: c, fillOpacity: 0.1, opacity: 0.6 };
                    },
                    onEachFeature: (f, l) => {
                        l.bindTooltip(f.properties.NOMGEO || "Alcaldía");
                    }
                }).addTo(map);
            });

        // --- 2. CARGA DE PUNTOS ---
        Papa.parse('https://raw.githubusercontent.com/observatoriopoliticas/cartografias-artesvivas/refs/heads/main/cdmx_artesvivas.csv', {
            download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
            complete: r => { 
                allData = r.data || []; 
                document.getElementById('universe-total').textContent = allData.length;
                setTimeout(() => { map.invalidateSize(); updateView(); }, 300);
            }
        });

        function updateView() {
            const filtered = allData.filter(d => {
                return Object.entries(activeFilters).every(([c, v]) => d[c] === v);
            });

            const tC = filtered.length;
            const tP = allData.length > 0 ? (tC / allData.length * 100) : 0;
            animate(tC, tP);

            markersLayer.clearLayers();
            filtered.forEach(p => {
                const lat = parseFloat(p.latitud || p.lat);
                const lng = parseFloat(p.longitud || p.lng);
                
                if (!isNaN(lat) && !isNaN(lng) && lat !== 0) {
                    const marker = L.circleMarker([lat, lng], {
                        radius: 8, fillColor: colors[p.disciplina] || colors['Otros'],
                        color: "#fff", weight: 2, fillOpacity: 0.9
                    });
                    
                    let html = `<div class="popup-container">`;
                    html += `<span class="p-title">${p.nombre || 'Espacio'}</span>`;
                    Object.keys(p).forEach(key => {
                        const val = p[key];
                        const low = key.toLowerCase();
                        if (!['lat','lng','latitud','longitud','carto_id'].includes(low) && val && low !== 'nombre') {
                            html += `<div class="p-row"><span class="p-label">${key.replace(/_/g,' ')}</span>${val}</div>`;
                        }
                    });
                    html += `</div>`;
                    
                    marker.bindPopup(html);
                    marker.addTo(markersLayer);
                }
            });

            document.getElementById('clear-btn').style.display = Object.keys(activeFilters).length > 0 ? 'block' : 'none';
            renderWidgets(filtered);
        }

        function animate(tC, tP) {
            const cEl = document.getElementById('total-count'), pEl = document.getElementById('pct-count');
            const sC = curC, sP = curP, dur = 400;
            let start = null;
            function step(t) {
                if (!start) start = t;
                const prog = Math.min((t - start) / dur, 1);
                curC = prog * (tC - sC) + sC;
                curP = prog * (tP - sP) + sP;
                cEl.textContent = Math.floor(curC);
                pEl.textContent = curP.toFixed(1) + "%";
                if (prog < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        function renderWidgets(data) {
            const container = document.getElementById('stats-container');
            const cols = ['disciplina', 'alcaldia', 'sostenimiento', 'estatus', 'aforo'];
            const openWidgets = Array.from(document.querySelectorAll('.widget.open')).map(w => w.dataset.col);
            container.innerHTML = '';

            cols.forEach(col => {
                const counts = {};
                data.forEach(d => { let v = d[col] || "N/A"; counts[v] = (counts[v] || 0) + 1; });
                const widget = document.createElement('div');
                widget.className = `widget ${openWidgets.includes(col) || (Object.keys(activeFilters).length === 0 && col === 'disciplina') ? 'open' : ''}`;
                widget.dataset.col = col;
                let html = `<div class="widget-header" onclick="this.parentElement.classList.toggle('open')"><span>${col}</span> <span>▾</span></div>`;
                html += `<div class="widget-content">`;
                Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([val, count]) => {
                    const barP = data.length > 0 ? (count / data.length * 100) : 0;
                    const isActive = activeFilters[col] === val;
                    const barC = col === 'disciplina' ? colors[val] || colors['Otros'] : '#ff4757';
                    html += `<div class="stat-row ${isActive ? 'active' : ''}" onclick="toggleFilter('${col}', '${val}')">
                        <div style="display:flex;justify-content:space-between;font-size:12px"><span>${val}</span><strong>${count}</strong></div>
                        <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${barP}%; background:${barC}"></div></div>
                    </div>`;
                });
                html += `</div>`;
                widget.innerHTML = html;
                container.appendChild(widget);
            });
        }

        function toggleFilter(c, v) {
            if (activeFilters[c] === v) delete activeFilters[c];
            else activeFilters[c] = v;
            updateView();
        }
        function clearAllFilters() { activeFilters = {}; updateView(); }
    </script>
</body>
</html>
