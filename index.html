<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Analítico | Artes Vivas CDMX</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #ff4757; --panel: #ffffff; --dark: #1e272e; --highlight: #f1c40f; }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #f0f0f0; display: flex; height: 100vh; overflow: hidden; }
        
        #dashboard {
            width: 380px; height: 100%; z-index: 1000;
            background: var(--panel); box-shadow: 10px 0 30px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; padding: 20px;
            overflow-y: auto; flex-shrink: 0; border-right: 1px solid #eee;
        }

        #map { flex-grow: 1; height: 100%; position: relative; background: #dcdde1; }

        /* ELIMINAR EL RECUADRO AZUL AL HACER CLIC EN ALCALDÍAS */
        path.leaflet-interactive:focus {
            outline: none !important;
        }

        .search-box {
            margin-bottom: 15px; padding: 12px; width: 100%;
            border: 2px solid #f1f2f6; border-radius: 8px;
            font-family: inherit; font-size: 0.9rem; outline: none;
        }

        .counter-section { 
            text-align: center; background: var(--dark); color: white;
            padding: 20px; border-radius: 16px; margin-bottom: 20px;
        }
        .total-counter { font-size: 3.5rem; font-weight: 900; color: #00d2ff; line-height: 1; }
        .registered-label { font-size: 0.8rem; color: #a4b0be; margin-top: 5px; }

        /* Widgets Estilo Facet */
        .widget { margin-top: 10px; border: 1px solid #f1f2f6; border-radius: 10px; overflow: hidden; background: #fff; }
        .widget-header { padding: 12px 15px; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; background: #fafafa; color: #57606f; }
        .widget-content { display: none; padding: 8px; }
        .widget.open .widget-content { display: block; }

        .stat-row { 
            margin-bottom: 6px; cursor: pointer; padding: 6px 8px; border-radius: 6px; 
            transition: 0.2s; position: relative; border: 1px solid transparent;
        }
        .stat-row:hover { background: #f8f9fa; border-color: #eee; }
        .stat-row.active { background: #fff5f5; border-color: var(--accent); color: var(--accent); font-weight: 700; }
        
        .stat-info { display: flex; justify-content: space-between; font-size: 11.5px; margin-bottom: 3px; }
        .stat-bar-bg { background: #eee; height: 4px; border-radius: 10px; }
        .stat-bar-fill { height: 100%; transition: width 0.4s ease; border-radius: 10px; }

        /* Popups */
        .popup-container { max-height: 250px; overflow-y: auto; font-size: 11px; width: 220px; }
        .p-title { color: var(--accent); font-weight: 900; font-size: 14px; display: block; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        .p-row { border-bottom: 1px solid #f9f9f9; padding: 4px 0; }
        .p-label { font-weight: 800; color: #999; text-transform: uppercase; font-size: 9px; display: block; }

        #clear-btn { display: none; margin-top: 10px; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: 800; text-transform: uppercase; font-size: 10px; }
    </style>
</head>
<body>

    <div id="dashboard">
        <h1>ARTES VIVAS CDMX</h1>
        <input type="text" class="search-box" id="search-input" placeholder="🔍 Buscar por nombre..." oninput="updateSearch()">
        
        <div class="counter-section">
            <div id="total-count" class="total-counter">0</div>
            <div class="registered-label">de <span id="universe-total">293</span> registrados</div>
            <div id="pct-count" style="color:#ff9ff3; font-weight:800; margin-top:5px;">0%</div>
            <button id="clear-btn" onclick="clearAllFilters()">✕ Limpiar Todo</button>
        </div>
        
        <div id="stats-container"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // --- DATA MAPS ---
        // Asegúrate de que los nombres de las propiedades aquí (ej. 'disciplina') coincidan 
        // EXACTAMENTE con las propiedades dentro de tu nuevo GeoJSON.
        const labelMap = {
            'disciplina': 'Disciplina', 'alcaldia': 'Alcaldía', 'condicion_mobiliaria': 'Condición mobiliaria',
            'circuito': 'Circuito', 'aforo': 'Aforo', 'ano_ap': 'Año Apertura',
            'ano_cl': 'Año Clausura', 'sostenimiento': 'Sostenimiento', 'estatus': 'Estatus'
        };

        const discColors = {
            'Música': '#E67E22', 'Teatro': '#D72638', 'Multidisciplina': '#5B21B6',
            'Artes escénicas': '#065F46', 'Otras disciplinas': '#374151',
            'Artes vivas': '#8E24AA', 'Danza': '#1E3A8A', 'Sin información': '#9CA3AF'
        };

        const alcPalette = {
            "Azcapotzalco": "#00CED1", "Coyoacán": "#FF1493", "Cuajimalpa de Morelos": "#7FFF00",
            "Gustavo A. Madero": "#00FA9A", "Iztacalco": "#FF00FF", "Iztapalapa": "#00BFFF",
            "La Magdalena Contreras": "#D2691E", "Milpa Alta": "#BDB76B", "Álvaro Obregón": "#20B2AA",
            "Tláhuac": "#EE82EE", "Tlalpan": "#CD853F", "Xochimilco": "#40E0D0",
            "Benito Juárez": "#BA55D3", "Cuauhtémoc": "#F08080", "Miguel Hidalgo": "#7B68EE",
            "Venustiano Carranza": "#FF69B4"
        };

        // --- STATE ---
        let allData = []; // Ahora guardará objetos con { lat, lng, props }
        let activeFilters = {
            disciplina: [], alcaldia: [], condicion_mobiliaria: [],
            circuito: [], aforo: [], ano_ap: [], ano_cl: [], 
            sostenimiento: [], estatus: []
        }; 
        let searchQuery = "";
        let curC = 0, curP = 0;

        const map = L.map('map', { center: [19.38, -99.13], zoom: 11, zoomControl: false });
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© CARTO' }).addTo(map);
        
        map.createPane('alcPane').style.zIndex = 200;
        map.createPane('markerPane').style.zIndex = 650;
        const markersLayer = L.layerGroup().addTo(map);

        // 1. CARGAR ALCALDÍAS (Polígonos de Fondo)
        fetch('https://raw.githubusercontent.com/JorgeCocompech/mapa-cdmx/refs/heads/main/cdmx-alcaldias.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    pane: 'alcPane',
                    style: (f) => {
                        const color = alcPalette[f.properties.NOMGEO] || "#ccc";
                        return { fillColor: color, weight: 1.5, color: "white", fillOpacity: 0.12 };
                    },
                    onEachFeature: (f, l) => l.bindTooltip(f.properties.NOMGEO)
                }).addTo(map);
            });

        // 2. CARGAR NUEVO GEOJSON DE RECINTOS
        fetch('https://raw.githubusercontent.com/JorgeCocompech/mapa-cdmx/refs/heads/main/data/av-data-cdmx-20230122.geojson')
            .then(res => res.json())
            .then(data => {
                // Transformar las features del GeoJSON al array plano que necesita el dashboard
                allData = data.features.map(f => {
                    // Extraer coordenadas asumiendo que es Point [lng, lat]
                    let lng = f.geometry.coordinates[0];
                    let lat = f.geometry.coordinates[1];
                    
                    // Combinar lat, lng y todas las propiedades en un solo objeto plano
                    return { lat: lat, longitud: lng, ...f.properties };
                });

                document.getElementById('universe-total').textContent = allData.length;
                updateView();
            });

        function updateView() {
            // Filtrar puntos para el mapa
            const filtered = allData.filter(d => {
                const matchesFilters = Object.entries(activeFilters).every(([col, selecteds]) => {
                    if (selecteds.length === 0) return true;
                    return selecteds.map(String).includes(String(d[col]));
                });
                
                // Asegurar que 'nombre' exista en las propiedades antes de buscar
                const nombre = d.nombre || ""; 
                const matchesSearch = nombre.toLowerCase().includes(searchQuery.toLowerCase());
                
                return matchesFilters && matchesSearch;
            });

            animateCounters(filtered.length, allData.length);

            markersLayer.clearLayers();
            filtered.forEach(p => {
                const lat = parseFloat(p.lat);
                const lng = parseFloat(p.longitud); // Usamos longitud porque lo mapeamos así arriba
                
                if (!isNaN(lat) && !isNaN(lng)) {
                    const marker = L.circleMarker([lat, lng], {
                        pane: 'markerPane', radius: 8, 
                        fillColor: discColors[p.disciplina] || discColors['Sin información'],
                        color: "#fff", weight: 2, fillOpacity: 1
                    });

                    marker.bindPopup(createPopup(p));
                    marker.on('mouseover', function() { if(!this._pinned) this.openPopup(); });
                    marker.on('mouseout', function() { if(!this._pinned) this.closePopup(); });
                    marker.on('click', function() {
                        markersLayer.eachLayer(m => m._pinned = false);
                        this._pinned = true; this.openPopup();
                    });
                    marker.addTo(markersLayer);
                }
            });

            document.getElementById('clear-btn').style.display = isAnyFilterActive() ? 'block' : 'none';
            renderAllWidgets(filtered);
        }

        function isAnyFilterActive() {
            return Object.values(activeFilters).some(arr => arr.length > 0) || searchQuery !== "";
        }

        // --- LÓGICA DE WIDGETS BI ---
        function renderAllWidgets(filteredData) {
            const container = document.getElementById('stats-container');
            const openWidgets = Array.from(document.querySelectorAll('.widget.open')).map(w => w.dataset.col);
            container.innerHTML = '';

            Object.keys(activeFilters).forEach(col => {
                const otherFilters = {...activeFilters};
                delete otherFilters[col];

                const baseForThisWidget = allData.filter(d => {
                    const matchesOther = Object.entries(otherFilters).every(([c, selecteds]) => {
                        if (selecteds.length === 0) return true;
                        return selecteds.map(String).includes(String(d[c]));
                    });
                    const nombre = d.nombre || "";
                    return matchesOther && nombre.toLowerCase().includes(searchQuery.toLowerCase());
                });

                const counts = {};
                baseForThisWidget.forEach(d => {
                    let v = d[col];
                    if (v === 0 || v === "0" || v === "" || v === null || v === undefined) v = "Sin dato";
                    counts[v] = (counts[v] || 0) + 1;
                });

                if (Object.keys(counts).length === 0) return;

                const widget = document.createElement('div');
                widget.className = `widget ${openWidgets.includes(col) || (isAnyFilterActive() === false && col === 'disciplina') ? 'open' : ''}`;
                widget.dataset.col = col;

                let html = `<div class="widget-header" onclick="this.parentElement.classList.toggle('open')"><span>${labelMap[col]}</span> ▾</div><div class="widget-content">`;
                
                Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([val, count]) => {
                    const isActive = activeFilters[col].map(String).includes(String(val));
                    const barP = (count / baseForThisWidget.length * 100).toFixed(0);
                    const barC = col === 'disciplina' ? (discColors[val] || '#ff4757') : '#ff4757';

                    html += `
                        <div class="stat-row ${isActive ? 'active' : ''}" onclick="toggleMultiFilter('${col}', '${val}')">
                            <div class="stat-info"><span>${val}</span><strong>${count}</strong></div>
                            <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${barP}%; background:${barC}"></div></div>
                        </div>`;
                });
                widget.innerHTML = html + `</div>`;
                container.appendChild(widget);
            });
        }

        function toggleMultiFilter(col, val) {
            const index = activeFilters[col].indexOf(val);
            if (index > -1) {
                activeFilters[col].splice(index, 1);
            } else {
                activeFilters[col].push(val);
            }
            updateView();
        }

        function createPopup(p) {
            let html = `<div class="popup-container"><span class="p-title">${p.nombre || 'Sin Nombre'}</span>`;
            Object.entries(labelMap).forEach(([key, label]) => {
                if (p[key] && p[key] !== 0 && p[key] !== "0") {
                    html += `<div class="p-row"><span class="p-label">${label}</span><span>${p[key]}</span></div>`;
                }
            });
            return html + `</div>`;
        }

        function updateSearch() { searchQuery = document.getElementById('search-input').value; updateView(); }
        
        function animateCounters(targetC, universeTotal) {
            const cEl = document.getElementById('total-count'), pEl = document.getElementById('pct-count');
            const targetP = universeTotal > 0 ? (targetC / universeTotal * 100) : 0;
            const startC = curC, startP = curP, dur = 400;
            let startT = null;
            function step(t) {
                if (!startT) startT = t;
                const prog = Math.min((t - startT) / dur, 1);
                curC = prog * (targetC - startC) + startC;
                curP = prog * (targetP - startP) + startP;
                cEl.textContent = Math.floor(curC);
                pEl.textContent = curP.toFixed(1) + "%";
                if (prog < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        function clearAllFilters() { 
            Object.keys(activeFilters).forEach(k => activeFilters[k] = []);
            document.getElementById('search-input').value = ""; searchQuery = ""; 
            updateView(); 
        }
    </script>
</body>
</html>
