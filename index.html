<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artes Vivas CDMX | Dashboard</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #ff4757; --bg: #f4f7f6; --panel: #ffffff; }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--bg); display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        #dashboard {
            width: 380px; height: 100%; z-index: 1000;
            background: var(--panel); box-shadow: 5px 0 20px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; padding: 25px;
            overflow-y: auto; flex-shrink: 0; border-right: 1px solid #eee;
        }

        #map { flex-grow: 1; height: 100%; position: relative; background: #e0e0e0; }

        h1 { font-size: 1.1rem; margin: 0; font-weight: 900; color: #2d3436; border-bottom: 4px solid var(--accent); display: inline-block; padding-bottom: 5px; }
        
        /* Sección del Contador */
        .counter-section { 
            margin: 25px 0; text-align: center; background: #2d3436; color: white;
            padding: 20px; border-radius: 12px; box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .total-counter { font-size: 3.5rem; font-weight: 900; color: var(--accent); line-height: 1; margin: 0; }
        .percentage-badge { font-size: 1.1rem; font-weight: 700; color: #dfe6e9; margin-top: 5px; display: block; }
        .total-label { font-size: 0.6rem; text-transform: uppercase; color: #b2bec3; letter-spacing: 2px; margin-top: 12px; font-weight: 600; }
        
        /* Widgets */
        .widget { margin-top: 10px; border: 1px solid #f1f2f6; border-radius: 8px; background: #fff; overflow: hidden; }
        .widget-header { 
            padding: 12px 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #636e72; background: #fdfdfd;
        }
        .widget-content { display: none; padding: 10px 15px; border-top: 1px solid #f1f2f6; }
        .widget.open .widget-content { display: block; }

        .stat-row { margin-bottom: 10px; cursor: pointer; }
        .stat-info { display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 4px; }
        .stat-bar-bg { background: #f1f2f6; height: 5px; border-radius: 10px; overflow: hidden; }
        .stat-bar-fill { height: 100%; background: var(--accent); transition: width 0.6s ease; opacity: 0.8; }
        .stat-row.active { color: var(--accent); font-weight: 700; }

        #clear-btn { display: none; margin-top: 15px; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 6px; width: 100%; cursor: pointer; font-weight: 800; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="dashboard">
        <h1>ARTES VIVAS CDMX</h1>
        <div class="counter-section">
            <p id="total-count" class="total-counter">0</p>
            <span id="pct-count" class="percentage-badge">0%</span>
            <div class="total-label">Filtro Territorial / Total</div>
            <button id="clear-btn" onclick="clearAllFilters()">✕ Limpiar Selección</button>
        </div>
        <div id="stats-container"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        // --- VARIABLES DE ESTADO ---
        let allData = [];
        let activeFilters = {}; 
        let lastCount = 0; // Para evitar NaN leyendo del DOM
        let lastPct = 0;   // Para evitar NaN leyendo del DOM
        
        const colors = {
            'Teatro': '#ff4757', 'Danza': '#3742fa', 'Música': '#ffa502', 
            'Performance': '#8e44ad', 'Interdisciplina': '#2ed573', 'Otros': '#747d8c'
        };

        const columnas = ['disciplina', 'alcaldia', 'sostenimiento', 'estatus', 'clausuras', 'aforo'];

        // --- INICIALIZAR MAPA ---
        const map = L.map('map', { center: [19.38, -99.13], zoom: 11, zoomControl: false });
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // NUEVA CAPA BASE: Esri World Gray (Más compatible)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Base/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri &mdash; Esri, DeLorme, NAVTEQ',
            maxZoom: 16
        }).addTo(map);

        const markersLayer = L.layerGroup().addTo(map);
        map.createPane('alcPane').style.zIndex = 200;

        // --- CARGAR GEOMETRÍA ---
        fetch('https://raw.githubusercontent.com/JorgeCocompech/mapa-cdmx/refs/heads/main/CDMX%20Alcaldias.geojson')
            .then(r => r.json())
            .then(data => {
                L.geoJSON(data, {
                    pane: 'alcPane',
                    style: { fillColor: '#2d3436', weight: 1, color: '#fff', fillOpacity: 0.1, opacity: 0.3 }
                }).addTo(map);
            }).catch(e => console.log("Error GeoJSON:", e));

        // --- CARGAR DATOS ---
        Papa.parse('https://raw.githubusercontent.com/observatoriopoliticas/cartografias-artesvivas/refs/heads/main/cdmx_artesvivas.csv', {
            download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
            complete: r => { 
                allData = r.data || []; 
                // Pequeño delay para asegurar que Safari reconozca el tamaño del div
                setTimeout(() => { map.invalidateSize(); updateView(); }, 200);
            }
        });

        function updateView() {
            const filtered = allData.filter(d => {
                return Object.entries(activeFilters).every(([col, val]) => d[col] === val);
            });

            const newCount = filtered.length;
            const newPct = allData.length > 0 ? ((newCount / allData.length) * 100) : 0;

            // Animación segura (Usando variables, no leyendo del DOM)
            animateNumeric('total-count', lastCount, newCount, false);
            animateNumeric('pct-count', lastPct, newPct, true);
            
            lastCount = newCount;
            lastPct = newPct;

            // Actualizar Marcadores
            markersLayer.clearLayers();
            filtered.forEach(p => {
                const lat = parseFloat(p.latitud || p.lat);
                const lng = parseFloat(p.longitud || p.lng);
                if (!isNaN(lat) && !isNaN(lng)) {
                    L.circleMarker([lat, lng], {
                        radius: 6, fillColor: colors[p.disciplina] || colors['Otros'],
                        color: "#fff", weight: 1.5, fillOpacity: 0.9
                    }).bindPopup(`<b>${p.nombre}</b><br><small>${p.disciplina}</small>`).addTo(markersLayer);
                }
            });

            document.getElementById('clear-btn').style.display = Object.keys(activeFilters).length > 0 ? 'block' : 'none';
            renderWidgets(filtered);
        }

        // --- ANIMACIÓN ROBUSTA ANTI-NaN ---
        function animateNumeric(id, start, end, isPct) {
            const obj = document.getElementById(id);
            const duration = 500;
            let startTime = null;

            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                const progress = Math.min((timestamp - startTime) / duration, 1);
                const current = progress * (end - start) + start;
                
                if (isPct) {
                    obj.textContent = current.toFixed(1) + "%";
                } else {
                    obj.textContent = Math.floor(current);
                }

                if (progress < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        function renderWidgets(data) {
            const container = document.getElementById('stats-container');
            const openWidgets = Array.from(document.querySelectorAll('.widget.open')).map(w => w.dataset.col);
            container.innerHTML = '';

            columnas.forEach(col => {
                const counts = {};
                data.forEach(d => { let v = d[col] || "N/A"; counts[v] = (counts[v] || 0) + 1; });

                const widget = document.createElement('div');
                widget.className = `widget ${openWidgets.includes(col) || (Object.keys(activeFilters).length === 0 && col === 'disciplina') ? 'open' : ''}`;
                widget.dataset.col = col;

                let html = `<div class="widget-header" onclick="this.parentElement.classList.toggle('open')"><span>${col.replace(/_/g,' ')}</span> <span>▾</span></div>`;
                html += `<div class="widget-content">`;
                
                const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
                sorted.forEach(([val, count]) => {
                    const barPct = data.length > 0 ? (count / data.length * 100) : 0;
                    const isActive = activeFilters[col] === val;
                    const barColor = col === 'disciplina' ? colors[val] || colors['Otros'] : '#ff4757';

                    html += `
                        <div class="stat-row ${isActive ? 'active' : ''}" onclick="toggleFilter('${col}', '${val}')">
                            <div class="stat-info"><span>${val}</span><strong>${count}</strong></div>
                            <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${barPct}%; background:${barColor}"></div></div>
                        </div>`;
                });
                html += `</div>`;
                widget.innerHTML = html;
                container.appendChild(widget);
            });
        }

        function toggleFilter(c, v) {
            if (activeFilters[c] === v) delete activeFilters[c];
            else activeFilters[c] = v;
            updateView();
        }

        function clearAllFilters() { activeFilters = {}; updateView(); }
    </script>
</body>
</html>
