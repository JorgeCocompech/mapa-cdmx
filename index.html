<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Analítico | Artes Vivas CDMX</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* MOTOR DE TEMAS: VARIABLES CSS */
        :root { --accent: #ff4757; }

        [data-theme="dark"] {
            --bg-color: #0d0d0d;
            --panel-bg: rgba(20, 20, 20, 0.95);
            --card-bg: #1c1c1e;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --highlight: #00d2ff;
            --border-color: #2c2c2e;
            --input-bg: #111;
            --row-hover: rgba(255,255,255,0.05);
            --row-active: rgba(0, 210, 255, 0.15);
            --bar-bg: #2c2c2e;
            --btn-bg: #333;
            --btn-hover: #ff4757;
        }

        [data-theme="light"] {
            --bg-color: #f2f2f7;
            --panel-bg: rgba(255, 255, 255, 0.95);
            --card-bg: #ffffff;
            --text-main: #1c1c1e;
            --text-muted: #8e8e93;
            --highlight: #007aff;
            --border-color: #e5e5ea;
            --input-bg: #f2f2f7;
            --row-hover: rgba(0,0,0,0.03);
            --row-active: rgba(0, 122, 255, 0.1);
            --bar-bg: #e5e5ea;
            --btn-bg: #e5e5ea;
            --btn-hover: #ff4757;
        }
        
        * { box-sizing: border-box; transition: background-color 0.3s, border-color 0.3s, color 0.3s; }
        body { 
            margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
            background: var(--bg-color); color: var(--text-main);
            display: flex; height: 100vh; overflow: hidden; 
        }
        
        /* Panel Lateral (Dashboard) */
        #dashboard {
            width: 400px; height: 100%; z-index: 1000;
            background: var(--panel-bg); backdrop-filter: blur(15px);
            display: flex; flex-direction: column; padding: 25px;
            overflow-y: auto; flex-shrink: 0; border-right: 1px solid var(--border-color);
        }
        
        #dashboard::-webkit-scrollbar { width: 6px; }
        #dashboard::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        #map { flex-grow: 1; height: 100%; position: relative; background: var(--bg-color); }

        /* Botón de Cambio de Tema */
        .theme-toggle-btn {
            position: absolute; top: 20px; right: 20px; z-index: 2000;
            background: var(--card-bg); color: var(--text-main);
            border: 1px solid var(--border-color);
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .theme-toggle-btn:hover { transform: scale(1.05); }

        /* Eliminar recuadro azul en SVG */
        path.leaflet-interactive:focus { outline: none !important; }

        /* Título y Buscador */
        h1 { font-size: 1.2rem; font-weight: 900; margin: 0 0 20px 0; letter-spacing: 1px; }
        
        .search-box {
            margin-bottom: 25px; padding: 14px; width: 100%;
            border: 1px solid var(--border-color); border-radius: 10px;
            background: var(--input-bg); color: var(--text-main);
            font-family: inherit; font-size: 0.9rem; outline: none; transition: 0.3s;
        }
        .search-box:focus { border-color: var(--highlight); }

        /* Sección del Contador Total */
        .counter-section { 
            display: flex; align-items: baseline; gap: 15px;
            margin-bottom: 30px; padding-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
        }
        .counter-info { display: flex; flex-direction: column; }
        .total-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
        .total-counter { font-size: 3.5rem; font-weight: 900; color: var(--highlight); line-height: 1; margin-top: 5px; }
        .percentage-badge { font-size: 1.2rem; font-weight: 600; color: #ff9ff3; margin-left: auto; }

        /* Widgets (Cards) */
        #stats-container { display: flex; flex-direction: column; gap: 15px; }
        
        .widget { 
            background: var(--card-bg); border-radius: 14px; 
            padding: 18px; border: 1px solid var(--border-color);
        }
        .widget-header { 
            font-size: 0.7rem; font-weight: 800; color: var(--text-muted); 
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 15px;
        }

        .stat-row { margin-bottom: 10px; cursor: pointer; border-radius: 6px; padding: 5px 8px; border: 1px solid transparent;}
        .stat-row:last-child { margin-bottom: 0; }
        .stat-row:hover { background: var(--row-hover); }
        .stat-row.active { background: var(--row-active); border-color: var(--highlight); }
        .stat-row.active .stat-info { color: var(--highlight); font-weight: 600; }
        
        .stat-info { 
            display: flex; justify-content: space-between; font-size: 0.85rem; 
            margin-bottom: 6px; color: var(--text-main); 
        }
        .stat-bar-bg { background: var(--bar-bg); height: 4px; border-radius: 10px; overflow: hidden; }
        .stat-bar-fill { height: 100%; transition: width 0.5s ease; border-radius: 10px; }

        /* Popups */
        .leaflet-popup-content-wrapper { background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 12px; }
        .leaflet-popup-tip { background: var(--card-bg); }
        .popup-container { max-height: 250px; overflow-y: auto; font-size: 11px; width: 220px; }
        .p-title { color: var(--highlight); font-weight: 900; font-size: 14px; display: block; margin-bottom: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 6px; }
        .p-row { border-bottom: 1px solid var(--border-color); padding: 5px 0; display: flex; flex-direction: column; gap: 2px;}
        .p-label { font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: 9px; }

        #clear-btn { display: none; margin-top: 20px; padding: 12px; background: var(--btn-bg); color: var(--text-main); border: none; border-radius: 10px; width: 100%; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
        #clear-btn:hover { background: var(--btn-hover); color: #fff; }
    </style>
</head>
<body data-theme="dark">

    <div id="dashboard">
        <h1>ARTES VIVAS CDMX</h1>
        <input type="text" class="search-box" id="search-input" placeholder="🔍 Buscar por nombre..." oninput="updateSearch()">
        
        <div class="counter-section">
            <div class="counter-info">
                <span class="total-label">Total Espacios</span>
                <span id="total-count" class="total-counter">0</span>
            </div>
            <span id="pct-count" class="percentage-badge">0%</span>
        </div>
        
        <div id="stats-container"></div>
        <button id="clear-btn" onclick="clearAllFilters()">✕ Limpiar Selección</button>
    </div>

    <div id="map">
        <button class="theme-toggle-btn" id="theme-btn" onclick="toggleTheme()" title="Cambiar Tema">🌞</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // --- DATA MAPS ---
        const labelMap = {
            'condicion_mobiliaria': 'Por Condición Mobiliaria',
            'circuito': 'Por Circuito',
            'estatus': 'Por Estatus',
            'disciplina': 'Por Disciplinas',
            'alcaldia': 'Por Alcaldía'
        };

        const discColors = {
            'Música': '#E67E22', 'Teatro': '#D72638', 'Multidisciplina': '#5B21B6',
            'Artes escénicas': '#065F46', 'Otras disciplinas': '#374151',
            'Artes vivas': '#8E24AA', 'Danza': '#1E3A8A', 'Sin información': '#9CA3AF'
        };

        const alcPalette = {
            "Azcapotzalco": "#00CED1", "Coyoacán": "#FF1493", "Cuajimalpa de Morelos": "#7FFF00",
            "Gustavo A. Madero": "#00FA9A", "Iztacalco": "#FF00FF", "Iztapalapa": "#00BFFF",
            "La Magdalena Contreras": "#D2691E", "Milpa Alta": "#BDB76B", "Álvaro Obregón": "#20B2AA",
            "Tláhuac": "#EE82EE", "Tlalpan": "#CD853F", "Xochimilco": "#40E0D0",
            "Benito Juárez": "#BA55D3", "Cuauhtémoc": "#F08080", "Miguel Hidalgo": "#7B68EE",
            "Venustiano Carranza": "#FF69B4"
        };

        // --- STATE ---
        let allData = [];
        let activeFilters = { condicion_mobiliaria: [], circuito: [], estatus: [], disciplina: [], alcaldia: [] }; 
        let searchQuery = "";
        let curC = 0, curP = 0;

        // --- CONFIGURACIÓN DE MAPA Y CAPAS TEMÁTICAS ---
        const map = L.map('map', { center: [19.38, -99.13], zoom: 11, zoomControl: false });
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        
        const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© CARTO' });
        const lightTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: '© CARTO' });
        
        darkTiles.addTo(map); // Inicia en oscuro
        
        map.createPane('alcPane').style.zIndex = 200;
        map.createPane('markerPane').style.zIndex = 650;
        const markersLayer = L.layerGroup().addTo(map);
        let alcaldiasLayer = null;

        // Lógica Cambio de Tema
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('theme-btn');
            
            if (body.getAttribute('data-theme') === 'dark') {
                body.setAttribute('data-theme', 'light');
                map.removeLayer(darkTiles);
                lightTiles.addTo(map);
                btn.textContent = '🌙';
            } else {
                body.setAttribute('data-theme', 'dark');
                map.removeLayer(lightTiles);
                darkTiles.addTo(map);
                btn.textContent = '🌞';
            }
            updateView(); // Refresca colores de marcadores
        }

        // 1. CARGAR ALCALDÍAS
        fetch('https://raw.githubusercontent.com/JorgeCocompech/mapa-cdmx/refs/heads/main/cdmx-alcaldias.geojson')
            .then(res => res.json())
            .then(data => {
                alcaldiasLayer = L.geoJSON(data, {
                    pane: 'alcPane',
                    style: (f) => {
                        const color = alcPalette[f.properties.NOMGEO] || "#333";
                        return { fillColor: color, weight: 1.5, color: color, fillOpacity: 0.1, opacity: 0.5 };
                    },
                    onEachFeature: (f, l) => l.bindTooltip(f.properties.NOMGEO)
                }).addTo(map);
            });

        // 2. CARGAR GEOJSON RECINTOS (A prueba de fallos)
        fetch('https://raw.githubusercontent.com/JorgeCocompech/mapa-cdmx/refs/heads/main/data/av-data-cdmx-20230122.geojson')
            .then(res => res.json())
            .then(data => {
                allData = data.features.map(f => {
                    let lng = null, lat = null;
                    if (f.geometry && f.geometry.coordinates) {
                        lng = f.geometry.coordinates[0];
                        lat = f.geometry.coordinates[1];
                    }
                    return { lat: lat, longitud: lng, ...f.properties };
                });
                updateView();
            });

        function updateView() {
            const filtered = allData.filter(d => {
                const matchesFilters = Object.entries(activeFilters).every(([col, selecteds]) => {
                    if (selecteds.length === 0) return true;
                    return selecteds.map(String).includes(String(d[col]));
                });
                const nombre = d.nombre || ""; 
                const matchesSearch = nombre.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesFilters && matchesSearch;
            });

            animateCounters(filtered.length, allData.length);
            markersLayer.clearLayers();

            // Detecta qué tema está activo para asignar el color del "Click"
            const activeHex = document.body.getAttribute('data-theme') === 'dark' ? '#00d2ff' : '#007aff';
            const borderHex = document.body.getAttribute('data-theme') === 'dark' ? '#ffffff' : '#333333';

            filtered.forEach(p => {
                const lat = parseFloat(p.lat);
                const lng = parseFloat(p.longitud); 
                
                if (!isNaN(lat) && !isNaN(lng)) {
                    const marker = L.circleMarker([lat, lng], {
                        pane: 'markerPane', radius: 6, 
                        fillColor: discColors[p.disciplina] || '#555',
                        color: borderHex, weight: 1.5, fillOpacity: 0.9
                    });

                    marker.bindPopup(createPopup(p));
                    marker.on('mouseover', function() { if(!this._pinned) this.openPopup(); });
                    marker.on('mouseout', function() { if(!this._pinned) this.closePopup(); });
                    
                    // El clic seguro con variables Hex
                    marker.on('click', function() {
                        markersLayer.eachLayer(m => { m._pinned = false; m.setStyle({color: borderHex, weight: 1.5}); });
                        this._pinned = true; 
                        this.setStyle({color: activeHex, weight: 3});
                        this.openPopup();
                    });
                    marker.addTo(markersLayer);
                }
            });

            document.getElementById('clear-btn').style.display = isAnyFilterActive() ? 'block' : 'none';
            renderAllWidgets(filtered);
        }

        // Clic en el mapa para deseleccionar
        map.on('click', function() {
            const borderHex = document.body.getAttribute('data-theme') === 'dark' ? '#ffffff' : '#333333';
            markersLayer.eachLayer(m => { m._pinned = false; m.setStyle({color: borderHex, weight: 1.5}); });
        });

        function isAnyFilterActive() {
            return Object.values(activeFilters).some(arr => arr.length > 0) || searchQuery !== "";
        }

        // --- LÓGICA DE WIDGETS ---
        function renderAllWidgets(filteredData) {
            const container = document.getElementById('stats-container');
            container.innerHTML = '';

            const cols = ['condicion_mobiliaria', 'circuito', 'estatus', 'disciplina', 'alcaldia'];

            cols.forEach(col => {
                const otherFilters = {...activeFilters};
                delete otherFilters[col];

                const baseForThisWidget = allData.filter(d => {
                    const matchesOther = Object.entries(otherFilters).every(([c, selecteds]) => {
                        if (selecteds.length === 0) return true;
                        return selecteds.map(String).includes(String(d[c]));
                    });
                    const nombre = d.nombre || "";
                    return matchesOther && nombre.toLowerCase().includes(searchQuery.toLowerCase());
                });

                const counts = {};
                baseForThisWidget.forEach(d => {
                    let v = d[col];
                    if (v === 0 || v === "0" || v === "" || v === null || v === undefined) v = "N/D";
                    counts[v] = (counts[v] || 0) + 1;
                });

                if (Object.keys(counts).length === 0) return;

                const widget = document.createElement('div');
                widget.className = 'widget';

                let html = `<div class="widget-header">${labelMap[col]}</div>`;
                
                Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([val, count]) => {
                    const isActive = activeFilters[col].map(String).includes(String(val));
                    const barP = (count / baseForThisWidget.length * 100).toFixed(0);
                    const barC = col === 'disciplina' ? (discColors[val] || 'var(--highlight)') : 'var(--highlight)';

                    html += `
                        <div class="stat-row ${isActive ? 'active' : ''}" onclick="toggleMultiFilter('${col}', '${val}')">
                            <div class="stat-info"><span>${val}</span><span>${count}</span></div>
                            <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${barP}%; background:${barC}"></div></div>
                        </div>`;
                });
                widget.innerHTML = html;
                container.appendChild(widget);
            });
        }

        function toggleMultiFilter(col, val) {
            const index = activeFilters[col].indexOf(val);
            if (index > -1) activeFilters[col].splice(index, 1);
            else activeFilters[col].push(val);
            updateView();
        }

        function createPopup(p) {
            let html = `<div class="popup-container"><span class="p-title">${p.nombre || 'Sin Nombre'}</span>`;
            const popupMap = { 'disciplina':'Disciplina', 'alcaldia':'Alcaldía', 'aforo':'Aforo', 'ano_ap':'Apertura' };
            Object.entries(popupMap).forEach(([key, label]) => {
                if (p[key] && p[key] !== 0 && p[key] !== "0") {
                    html += `<div class="p-row"><span class="p-label">${label}</span><span>${p[key]}</span></div>`;
                }
            });
            return html + `</div>`;
        }

        function updateSearch() { searchQuery = document.getElementById('search-input').value; updateView(); }
        
        function animateCounters(targetC, universeTotal) {
            const cEl = document.getElementById('total-count'), pEl = document.getElementById('pct-count');
            const targetP = universeTotal > 0 ? (targetC / universeTotal * 100) : 0;
            const startC = curC, startP = curP, dur = 400;
            let startT = null;
            function step(t) {
                if (!startT) startT = t;
                const prog = Math.min((t - startT) / dur, 1);
                curC = prog * (targetC - startC) + startC;
                curP = prog * (targetP - startP) + startP;
                cEl.textContent = Math.floor(curC);
                
                if(targetC === universeTotal) pEl.textContent = "";
                else pEl.textContent = curP.toFixed(0) + "%";

                if (prog < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        function clearAllFilters() { 
            Object.keys(activeFilters).forEach(k => activeFilters[k] = []);
            document.getElementById('search-input').value = ""; searchQuery = ""; 
            updateView(); 
        }
    </script>
</body>
</html>
