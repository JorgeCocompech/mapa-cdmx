<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timelapse Analítico | Artes Vivas CDMX</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #ff4757;
            --highlight: #00d2ff;
            --bg: #0a0c0e;
            --panel-bg: rgba(18, 22, 25, 0.96);
            --card-bg: #1e272e;
            --text-main: #ffffff;
            --text-dim: #a4b0be;
            --click-glow: #f1c40f;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Dashboard de Control */
        #sidebar {
            width: 380px; height: 100%; z-index: 2000;
            background: var(--panel-bg); backdrop-filter: blur(25px);
            border-right: 1px solid rgba(255,255,255,0.08);
            display: flex; flex-direction: column; padding: 30px;
            overflow-y: auto; scrollbar-width: none;
        }
        #sidebar::-webkit-scrollbar { display: none; }

        #map { flex-grow: 1; height: 100%; position: relative; background: #000; }

        /* Estética Vibe Coding */
        h1 { font-size: 1.2rem; font-weight: 900; margin: 0 0 5px 0; letter-spacing: -0.5px; }
        .subtitle { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; display: block; }

        .search-box {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 14px; border-radius: 12px; color: white; width: 100%; margin-bottom: 20px;
            font-family: inherit; transition: 0.3s;
        }
        .search-box:focus { border-color: var(--highlight); outline: none; background: rgba(255,255,255,0.08); }

        /* Contador Dinámico */
        .big-stats { text-align: center; margin-bottom: 30px; padding: 25px; background: #000; border-radius: 20px; border: 1px solid #222; }
        #total-count { font-size: 4.5rem; font-weight: 900; color: var(--highlight); line-height: 0.9; font-family: 'JetBrains Mono', monospace; }
        .stat-label { font-size: 0.8rem; color: var(--text-dim); margin-top: 10px; font-weight: 600; text-transform: uppercase; }

        /* Widgets Analíticos */
        .widget { margin-top: 15px; border-radius: 14px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); }
        .widget-header { padding: 16px; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.7rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase;}
        .widget.open .widget-content { display: block; }
        .widget-content { display: none; padding: 0 16px 16px 16px; }

        .stat-row { margin-bottom: 10px; cursor: pointer; padding: 4px 0; border-radius: 4px;}
        .stat-row.active { color: var(--accent); font-weight: bold;}
        .stat-info { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
        .stat-bar { background: rgba(255,255,255,0.05); height: 4px; border-radius: 10px; overflow: hidden; }
        .stat-bar-fill { height: 100%; transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1); }

        /* TIMELINE CONTROLLER (CARTO STYLE) */
        #timeline-ui {
            position: absolute; bottom: 40px; left: 420px; right: 40px;
            background: rgba(15, 18, 20, 0.95); padding: 20px 35px; border-radius: 100px;
            z-index: 1500; border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }

        .ctrl-btn {
            background: #222; border: none; color: white; width: 40px; height: 40px;
            border-radius: 50%; cursor: pointer; font-size: 1rem; display: flex;
            align-items: center; justify-content: center; transition: 0.2s;
        }
        .ctrl-btn:hover { background: #444; }
        
        .play-btn {
            background: var(--highlight); border: none; width: 55px; height: 55px; color: #000;
            border-radius: 50%; cursor: pointer; font-size: 1.5rem; display: flex;
            align-items: center; justify-content: center; transition: 0.3s;
        }
        .play-btn:hover { transform: scale(1.15); box-shadow: 0 0 25px rgba(0,210,255,0.4); background: #fff;}

        #year-focus { font-family: 'JetBrains Mono', monospace; font-size: 2.8rem; font-weight:800; color: var(--highlight); min-width: 140px; text-align: center; }

        .slider-container { flex-grow: 1; display: flex; flex-direction: column; }
        input[type=range] { flex-grow: 1; accent-color: var(--highlight); cursor: pointer; height: 6px; background: rgba(255,255,255,0.2); outline: none; border-radius: 4px; }
        .speed-ctrl { font-size: 10px; color: #888; text-transform: uppercase; font-weight: 800; cursor: pointer; margin-top: 8px; text-align: right; }
        .speed-ctrl span { padding: 3px 8px; border-radius: 4px; transition: 0.2s; }
        .speed-ctrl span.active { background: var(--highlight); color: #000; }

        /* Leaflet Overrides y Popups */
        .leaflet-popup-content-wrapper { background: rgba(20, 24, 28, 0.95); color: #fff; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; backdrop-filter: blur(10px); }
        .leaflet-popup-tip { background: rgba(20, 24, 28, 0.95); border: 1px solid rgba(255,255,255,0.1); }
        .popup-container { max-height: 250px; overflow-y: auto; font-size: 11px; width: 220px; }
        .p-title { color: var(--highlight); font-weight: 900; font-size: 14px; display: block; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px; }
        .p-row { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 4px 0; }
        .p-label { font-weight: 800; color: #888; text-transform: uppercase; font-size: 9px; display: block; }

        /* Animación Pulsar (Nacimiento de Espacio) */
        @keyframes pulse-ring {
            0% { transform: scale(0.5); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(255, 255, 255, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }
        .marker-pulse { animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) forwards; }

        #clear-btn { display: none; margin-top: 15px; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: 800; text-transform: uppercase; font-size: 10px; }
    </style>
</head>
<body>

    <aside id="sidebar">
        <h1>OBSERVATORIO</h1>
        <span class="subtitle">Artes Vivas CDMX</span>

        <input type="text" class="search-box" id="search-input" placeholder="🔍 Filtrar por nombre..." oninput="updateSearch()">

        <div class="big-stats">
            <div id="total-count">0</div>
            <div class="stat-label">Espacios activos en <span id="label-year" style="color:var(--highlight)">-</span></div>
            <div id="pct-count" style="color: #ff9ff3; font-weight: 800; font-size: 1.2rem; margin-top:10px;">0%</div>
            <button id="clear-btn" onclick="clearAllFilters()">✕ Limpiar Selección</button>
        </div>

        <div id="stats-container"></div>
    </aside>

    <main id="map">
        <div id="timeline-ui">
            <button class="ctrl-btn" onclick="stepTime(-1)">⏮</button>
            <button class="play-btn" id="play-btn" onclick="togglePlayback()">▶</button>
            <button class="ctrl-btn" onclick="stepTime(1)">⏭</button>
            
            <div id="year-focus">2024</div>
            
            <div class="slider-container">
                <input type="range" id="time-slider" oninput="handleTimeChange(this.value)">
                <div class="speed-ctrl">
                    Velocidad: 
                    <span id="sp-1" class="active" onclick="setSpeed(1, 800)">1x</span>
                    <span id="sp-2" onclick="setSpeed(2, 300)">2x</span>
                    <span id="sp-3" onclick="setSpeed(3, 100)">3x</span>
                </div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <script>
        // --- CONFIG & PALETTE ---
        const labelMap = {
            'disciplina': 'Disciplina', 'alcaldia': 'Alcaldía', 'condicion_mobiliaria': 'Condición mobiliaria',
            'circuito': 'Circuito', 'aforo': 'Aforo', 'ano_ap': 'Año Apertura',
            'ano_cl': 'Año Clausura', 'sostenimiento': 'Sostenimiento', 'estatus': 'Estatus', 'contacto': 'Contacto'
        };

        const discColors = {
            'Música': '#E67E22', 'Teatro': '#D72638', 'Multidisciplina': '#5B21B6',
            'Artes escénicas': '#065F46', 'Otras disciplinas': '#374151',
            'Artes vivas': '#8E24AA', 'Danza': '#1E3A8A', 'Sin información': '#9CA3AF'
        };

        const alcPalette = {
            "Azcapotzalco": "#00CED1", "Coyoacán": "#FF1493", "Cuajimalpa de Morelos": "#7FFF00",
            "Gustavo A. Madero": "#00FA9A", "Iztacalco": "#FF00FF", "Iztapalapa": "#00BFFF",
            "La Magdalena Contreras": "#D2691E", "Milpa Alta": "#BDB76B", "Álvaro Obregón": "#20B2AA",
            "Tláhuac": "#EE82EE", "Tlalpan": "#CD853F", "Xochimilco": "#40E0D0",
            "Benito Juárez": "#BA55D3", "Cuauhtémoc": "#F08080", "Miguel Hidalgo": "#7B68EE",
            "Venustiano Carranza": "#FF69B4"
        };

        let allData = [], activeFilters = { disciplina: [], alcaldia: [], condicion_mobiliaria: [], circuito: [], aforo: [], sostenimiento: [], estatus: [] };
        let currentYear = 2024, searchQuery = "", isPlaying = false, animationTimer = null, playSpeed = 800;
        let timelinePoints = [];
        let curC = 0;

        const map = L.map('map', { center: [19.38, -99.13], zoom: 11, zoomControl: false, doubleClickZoom: false });
        L.control.zoom({ position: 'topright' }).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© CARTO' }).addTo(map);
        
        map.createPane('alcPane').style.zIndex = 200;
        map.createPane('markerPane').style.zIndex = 650;
        const markersLayer = L.layerGroup().addTo(map);

        // 1. Cargar Alcaldías
        fetch('https://raw.githubusercontent.com/JorgeCocompech/mapa-cdmx/refs/heads/main/cdmx-alcaldias.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    pane: 'alcPane',
                    style: (f) => {
                        const color = alcPalette[f.properties.NOMGEO] || "#333";
                        return { fillColor: color, weight: 1.5, color: color, fillOpacity: 0.1, opacity: 0.3 };
                    },
                    onEachFeature: (f, l) => l.bindTooltip(f.properties.NOMGEO, {className: 'leaflet-tooltip'})
                }).addTo(map);
            });

        // 2. Cargar Datos y Preparar Motor de Tiempo
        Papa.parse('https://raw.githubusercontent.com/observatoriopoliticas/cartografias-artesvivas/refs/heads/main/cdmx_artesvivas.csv', {
            download: true, header: true, dynamicTyping: true, skipEmptyLines: true,
            complete: r => { 
                // Limpieza estricta de fechas para que la lógica matemática no falle
                allData = r.data.map(d => {
                    return {
                        ...d,
                        _apertura: parseInt(d.ano_ap) || 0,
                        _clausura: parseInt(d.ano_cl) || 0
                    };
                });
                initTimeEngine();
                updateView();
            }
        });

        // --- MOTOR DE TIEMPO "ELASTIC" ---
        function initTimeEngine() {
            // Extraer solo años válidos mayores a 1850 para no tener siglos vacíos
            const validYears = allData.map(d => d._apertura).filter(y => y > 1850);
            const minYear = validYears.length > 0 ? Math.min(...validYears) : 1950;
            const maxYear = new Date().getFullYear();

            // Rellenar array secuencial desde el más antiguo hasta hoy
            let seq = [];
            for(let y = minYear; y <= maxYear; y++) seq.push(y);
            timelinePoints = seq;

            const slider = document.getElementById('time-slider');
            slider.min = 0;
            slider.max = timelinePoints.length - 1;
            slider.value = timelinePoints.length - 1;
            
            updateYearDisplay(timelinePoints[slider.value]);
        }

        function handleTimeChange(index) {
            currentYear = timelinePoints[index];
            updateYearDisplay(currentYear);
            updateView();
        }

        function updateYearDisplay(y) {
            document.getElementById('year-focus').textContent = y;
            document.getElementById('label-year').textContent = y;
        }

        function stepTime(dir) {
            const slider = document.getElementById('time-slider');
            let newVal = parseInt(slider.value) + dir;
            if(newVal < 0) newVal = 0;
            if(newVal > parseInt(slider.max)) newVal = parseInt(slider.max);
            slider.value = newVal;
            handleTimeChange(newVal);
        }

        function setSpeed(id, ms) {
            playSpeed = ms;
            document.querySelectorAll('.speed-ctrl span').forEach(el => el.classList.remove('active'));
            document.getElementById('sp-'+id).classList.add('active');
            if(isPlaying) { togglePlayback(); togglePlayback(); } // Reset timer
        }

        function togglePlayback() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('play-btn');
            if(isPlaying) {
                btn.innerHTML = "⏸";
                const slider = document.getElementById('time-slider');
                if(parseInt(slider.value) >= parseInt(slider.max)) { slider.value = 0; handleTimeChange(0); }
                
                animationTimer = setInterval(() => {
                    let nextVal = parseInt(slider.value) + 1;
                    if(nextVal > parseInt(slider.max)) { togglePlayback(); return; }
                    slider.value = nextVal;
                    handleTimeChange(nextVal);
                }, playSpeed);
            } else {
                btn.innerHTML = "▶";
                clearInterval(animationTimer);
            }
        }

        // --- LÓGICA VISUAL Y FILTROS CRUZADOS ---
        function updateView() {
            // Filtrado: Tiempo + Búsqueda + Filtros Activos
            const filtered = allData.filter(d => {
                // Filtros de Widgets
                const matchesFilters = Object.entries(activeFilters).every(([col, selecteds]) => {
                    if (selecteds.length === 0) return true;
                    return selecteds.includes(String(d[col]));
                });
                
                // Búsqueda Textual
                const matchesSearch = d.nombre.toLowerCase().includes(searchQuery.toLowerCase());
                
                // Lógica de Existencia Temporal
                // Existe si (su año de apertura <= año actual) O (no tiene fecha registrada)
                // Desaparece si (tiene clausura > 0) Y (su clausura es anterior al año actual)
                const exists = (d._apertura <= currentYear || d._apertura === 0);
                const notDead = (d._clausura === 0 || d._clausura > currentYear);

                return matchesFilters && matchesSearch && exists && notDead;
            });

            animateCounter(filtered.length);

            markersLayer.clearLayers();
            filtered.forEach(p => {
                const lat = parseFloat(p.latitud), lng = parseFloat(p.longitud);
                if (!isNaN(lat) && !isNaN(lng)) {
                    
                    // Evaluar si acaba de nacer este año exacto (Efecto Pulsar)
                    const justBorn = (p._apertura === currentYear);
                    const cssClass = justBorn && isPlaying ? 'marker-pulse' : '';

                    const marker = L.circleMarker([lat, lng], {
                        pane: 'markerPane', radius: 7, 
                        fillColor: discColors[p.disciplina] || discColors['Sin información'],
                        color: "#fff", weight: 1.5, fillOpacity: 0.9,
                        className: cssClass
                    });

                    // Evita el zoom loco desactivando el autoPan
                    marker.bindPopup(createPopup(p), { autoPan: false });
                    
                    marker.on('mouseover', function() { if(!this._pinned) this.openPopup(); });
                    marker.on('mouseout', function() { if(!this._pinned) this.closePopup(); });
                    marker.on('click', function() {
                        markersLayer.eachLayer(m => { m._pinned = false; m.setStyle({color: '#fff', weight: 1.5}); });
                        this._pinned = true;
                        this.setStyle({color: '#f1c40f', weight: 4}); // El color hex directamente, sin variables CSS problemáticas
                        this.openPopup();
                    });
                    
                    marker.addTo(markersLayer);
                }
            });

            document.getElementById('clear-btn').style.display = isAnyFilterActive() ? 'block' : 'none';
            renderAllWidgets(filtered);
        }

        map.on('click', function() { 
            markersLayer.eachLayer(m => { m._pinned = false; m.setStyle({color: '#fff', weight: 1.5}); });
        });

        function isAnyFilterActive() { return Object.values(activeFilters).some(arr => arr.length > 0) || searchQuery !== ""; }

        function renderAllWidgets(filteredData) {
            const container = document.getElementById('stats-container');
            const openWidgets = Array.from(document.querySelectorAll('.widget.open')).map(w => w.dataset.col);
            container.innerHTML = '';

            Object.keys(activeFilters).forEach(col => {
                // Aislar el cálculo para permitir multiselección sin borrar las otras opciones
                const tempFilters = {...activeFilters};
                delete tempFilters[col];

                const baseForThisWidget = allData.filter(d => {
                    const matchesOther = Object.entries(tempFilters).every(([c, sel]) => {
                        if (sel.length === 0) return true;
                        return sel.includes(String(d[c]));
                    });
                    const exists = (d._apertura <= currentYear || d._apertura === 0);
                    const notDead = (d._clausura === 0 || d._clausura > currentYear);
                    return matchesOther && exists && notDead && d.nombre.toLowerCase().includes(searchQuery.toLowerCase());
                });

                const counts = {};
                baseForThisWidget.forEach(d => {
                    let v = d[col];
                    if (v === 0 || v === "0" || v === "" || v === null) v = "Sin dato";
                    counts[v] = (counts[v] || 0) + 1;
                });

                if (Object.keys(counts).length === 0) return;

                const widget = document.createElement('div');
                widget.className = `widget ${openWidgets.includes(col) || (col === 'disciplina' && !isAnyFilterActive()) ? 'open' : ''}`;
                widget.dataset.col = col;

                let h = `<div class="widget-header" onclick="this.parentElement.classList.toggle('open')"><span>${labelMap[col] || col}</span> ▾</div><div class="widget-content">`;
                
                Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([val, count]) => {
                    const isActive = activeFilters[col].includes(String(val));
                    const barP = (count / baseForThisWidget.length * 100).toFixed(0);
                    const barC = col === 'disciplina' ? (discColors[val] || '#00d2ff') : '#00d2ff';

                    h += `
                        <div class="stat-row ${isActive ? 'active' : ''}" onclick="toggleMultiFilter('${col}', '${val}')">
                            <div class="stat-info"><span>${val}</span><strong>${count}</strong></div>
                            <div class="stat-bar"><div class="stat-bar-fill" style="width:${barP}%; background:${barC}"></div></div>
                        </div>`;
                });
                widget.innerHTML = h + `</div>`;
                container.appendChild(widget);
            });
        }

        function toggleMultiFilter(col, val) {
            const index = activeFilters[col].indexOf(String(val));
            if (index > -1) activeFilters[col].splice(index, 1);
            else activeFilters[col].push(String(val));
            updateView();
        }

        function createPopup(p) {
            let html = `<div class="popup-container"><span class="p-title">${p.nombre}</span>`;
            Object.entries(labelMap).forEach(([key, label]) => {
                const val = p[key];
                if (val && val !== 0 && val !== "0") {
                    html += `<div class="p-row"><span class="p-label">${label}</span><span>${val}</span></div>`;
                }
            });
            return html + `</div>`;
        }

        function updateSearch() { searchQuery = document.getElementById('search-input').value; updateView(); }
        
        function animateCounter(target) {
            const el = document.getElementById('total-count');
            const pct = document.getElementById('pct-count');
            const start = curC;
            const dur = 300;
            let st = null;
            function step(t) {
                if(!st) st = t;
                const prog = Math.min((t - st) / dur, 1);
                curC = prog * (target - start) + start;
                el.textContent = Math.floor(curC);
                pct.textContent = (allData.length > 0 ? (curC/allData.length*100) : 0).toFixed(1) + "%";
                if(prog < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        function clearAllFilters() { 
            Object.keys(activeFilters).forEach(k => activeFilters[k] = []);
            document.getElementById('search-input').value = ""; searchQuery = ""; 
            updateView(); 
        }
    </script>
</body>
</html>
